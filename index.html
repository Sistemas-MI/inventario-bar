<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Bar - Clandestinna</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div>
    <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
            <div class="logo-icon"><i class="ti ti-bottle"></i></div>
            <div>
                <div class="logo-name">CLANDESTINNA</div>
                <div class="logo-sub">Control de Inventario</div>
            </div>
        </div>
        <div class="pill" id="top-pill">Cargando datos...</div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <div class="nav-lbl">Control</div>
            <button class="nav-btn active" onclick="go('dash')"><i class="ti ti-layout-dashboard"></i>Dashboard</button>
            <button class="nav-btn" onclick="go('ventas')"><i class="ti ti-receipt"></i>Registrar ventas</button>
            <div class="nav-lbl">Configuración</div>
            <button class="nav-btn" onclick="go('recetas')"><i class="ti ti-list-details"></i>Recetas</button>
            <button class="nav-btn" onclick="go('catalogo')"><i class="ti ti-bottle"></i>Catálogo</button>
        </div>
        <div class="main" id="main">
            <div class="loading"><i class="ti ti-loader-2 ti-spin"></i> Conectando con Supabase...</div>
        </div>
    </div>
</div>

<script>
// ==========================================================================
// CONFIGURACIÓN DE BASE DE DATOS (SUPABASE REAL)
// ==========================================================================
const SUPABASE_URL = 'https://yhfeyycvhdcngwqbxvqy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloZmV5eWN2aGRjbmd3cWJ4dnF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4Mjc4MTYsImV4cCI6MjA5NTQwMzgxNn0.f0x3rE-brskkG_prKpjszOg1HhtTq195AQoqhjsztDY';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let spirits = [];
let recipes = [];
let sales = [];
let curTab = 'dash';

// Filtros Globales
window._wkFilter = 'all';

// Inicialización de la Aplicación
async function init() {
  try {
    let { data: sp } = await sb.from('spirits').select('*').order('name');
    let { data: rc } = await sb.from('recipes').select('*, recipe_ingredients(*)');
    let { data: sl } = await sb.from('sales').select('*').order('id', { ascending: false });
    
    spirits = sp || [];
    recipes = rc || [];
    sales = sl || [];
    
    updatePill();
    go('dash');
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="loading" style="color:var(--color-coral)">Error al inicializar la base de datos: ${e.message}</div>`;
  }
}

function updatePill() {
  const total = sales.reduce((s, x) => s + x.qty, 0);
  document.getElementById('top-pill').textContent = `${total} bebida${total !== 1 ? 's' : ''} vendida${total !== 1 ? 's' : ''}`;
}

// Lógica de Consumo y Niveles de Insumos
function getConsumedML(sid) {
  return sales.reduce((t, s) => {
    const r = recipes.find(x => x.id === s.cocktail_id);
    if (!r || !r.recipe_ingredients) return t;
    const ing = r.recipe_ingredients.find(i => i.id_spirit === sid);
    return t + (ing ? s.qty * ing.ml : 0);
  }, 0);
}

function getRemainingBottles(sp) {
  const rem = sp.stock - (getConsumedML(sp.id) / sp.ml);
  return rem < 0 ? 0 : rem;
}

function getRemainingPct(sp) {
  if (sp.stock === 0) return 0;
  const p = getRemainingBottles(sp) / sp.stock;
  return p > 1 ? 1 : p;
}

function status(p) {
  if (p <= 0) return { cls: 'b-zero', lbl: 'Agotado' };
  if (p >= 0.5) return { cls: 'b-ok', lbl: 'OK' };
  if (p >= 0.25) return { cls: 'b-warn', lbl: 'Bajo' };
  return { cls: 'b-crit', lbl: 'Crítico' };
}

// Generador de Componentes SVG (Botellas)
function bottleSVG(p) {
  const W = 32, H = 72;
  const fillH = Math.round((H - 14) * p);
  const fillY = H - 4 - fillH;
  const color = p <= 0 ? '#ef4444' : p >= 0.5 ? '#86efac' : p >= 0.25 ? '#fde047' : '#fca5a5';
  const uid = 'b' + Math.round(p * 100) + '_' + Math.round(Math.random() * 1000);
  return `<svg width="${W}" height="${H+12}" viewBox="0 0 ${W} ${H+12}" style="display:block;margin:0 auto">
    <defs><clipPath id="${uid}"><rect x="5" y="12" width="${W-10}" height="${H-12}" rx="3"/></clipPath></defs>
    <rect x="11" y="2" width="${W-22}" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1" opacity=".2"/>
    <rect x="5" y="12" width="${W-10}" height="${H-12}" rx="3" fill="none" stroke="currentColor" stroke-width="1" opacity=".15"/>
    <rect x="5" y="${fillY}" width="${W-10}" height="${fillH+4}" fill="${color}" opacity=".7" clip-path="url(#${uid})"/>
    <text x="${W/2}" y="${H+11}" text-anchor="middle" font-size="10" fill="currentColor" opacity=".5">${Math.round(p*100)}%</text>
  </svg>`;
}

// Enrutador de Secciones
function go(tab) {
  curTab = tab;
  document.querySelectorAll('.nav-btn').forEach((el, i) => {
    el.classList.toggle('active', ['dash', 'ventas', 'recetas', 'catalogo'][i] === tab);
  });
  render();
}

function render() {
  const el = document.getElementById('main');
  if (curTab === 'dash') el.innerHTML = rDash();
  if (curTab === 'ventas') el.innerHTML = rVentas();
  if (curTab === 'recetas') el.innerHTML = rRecetas();
  if (curTab === 'catalogo') el.innerHTML = rCatalogo();
}

// ==========================================================================
// RENDERIZADO DE MÓDULOS DE INTERFAZ
// ==========================================================================
function rDash() {
  let ok = 0, warn = 0, crit = 0, zero = 0;
  spirits.forEach(sp => {
    const p = getRemainingPct(sp);
    if (p <= 0) zero++; else if (p >= 0.5) ok++; else if (p >= 0.25) warn++; else crit++;
  });
  
  const crits = spirits.filter(sp => getRemainingPct(sp) < 0.25);
  const alertHTML = crits.length ? `<div class="alert-bar"><i class="ti ti-alert-triangle"></i><span>Hay ${crits.length} licores en nivel crítico o agotados. Revisa el catálogo.</span></div>` : '';
  
  const cards = spirits.map(sp => {
    const p = getRemainingPct(sp);
    const rem = getRemainingBottles(sp);
    const st = status(p);
    return `<div class="bottle-card">
      ${bottleSVG(p)}
      <div class="b-name">${sp.name}</div>
      <div class="b-cat">${sp.cat}</div>
      <div style="margin-top:8px"><span class="badge ${st.cls}">${st.lbl}</span></div>
      <div class="b-info">${Math.round(rem * sp.ml)} ml disp.</div>
      <div class="b-info" style="font-weight:500;color:var(--color-text-primary)">${rem.toFixed(2)} bot.</div>
    </div>`;
  }).join('');
  
  return `<div class="page-title">Dashboard General</div>
    <div class="page-sub">Inventario en tiempo real sincronizado en la nube</div>
    ${alertHTML}
    <div class="stats-row">
      <div class="stat"><div class="stat-lbl">Total Etiquetas</div><div class="stat-val">${spirits.length}</div></div>
      <div class="stat"><div class="stat-lbl" style="color:#86efac">Licores OK</div><div class="stat-val" style="color:#86efac">${ok}</div></div>
      <div class="stat"><div class="stat-lbl" style="color:#fde047">Nivel Bajo</div><div class="stat-val" style="color:#fde047">${warn + crit}</div></div>
      <div class="stat"><div class="stat-lbl" style="color:#ef4444">Agotados</div><div class="stat-val" style="color:#ef4444">${zero}</div></div>
    </div>
    <div class="bottle-grid">${cards}</div>`;
}

function rVentas() {
  const weeks = [...new Set(sales.map(s => s.week))].filter(Boolean).sort();
  const wkOpts = `<option value="all">Ver todas las semanas</option>` + weeks.map(w => `<option value="${w}" ${window._wkFilter === w ? 'selected' : ''}>${w}</option>`).join('');
  const rOpts = [...recipes].sort((a,b) => a.name.localeCompare(b.name)).map(r => `<option value="${r.id}">${r.name} (${r.cat})</option>`).join('');
  
  const filtered = window._wkFilter === 'all' ? sales : sales.filter(s => s.week === window._wkFilter);
  const rows = filtered.length ? filtered.map(s => {
    const r = recipes.find(x => x.id === s.cocktail_id);
    const ingsHTML = r && r.recipe_ingredients ? r.recipe_ingredients.map(i => {
      const sp = spirits.find(x => x.id === i.id_spirit);
      return sp ? `<span class="ml-chip">${sp.name.split(' ')[0]}: -${i.ml * s.qty}ml</span>` : '';
    }).join('') : '—';
    
    return `<tr>
      <td style="font-weight:600">${r ? r.name : 'Cóctel Desconocido'}</td>
      <td><span class="tag">${r ? r.cat : '—'}</span></td>
      <td style="text-align:center;font-weight:600">${s.qty}</td>
      <td><span class="wk-tag">${s.week}</span></td>
      <td><div style="display:flex;flex-wrap:wrap;gap:2px">${ingsHTML}</div></td>
      <td style="text-align:right"><button class="btn btn-sm" style="color:#ef4444" onclick="delSale(${s.id})"><i class="ti ti-trash"></i></button></td>
    </tr>`;
  }).join('') : '<tr><td colspan="6" class="empty">No hay ventas registradas en esta selección.</td></tr>';

  return `<div class="page-title">Módulo de Ventas</div>
    <div class="page-sub">Registra consumos para descontar automáticamente mililitros de la barra</div>
    <div style="display:grid;grid-template-columns:1fr 2fr;gap:24px;align-items:start">
      <div class="card">
        <div class="card-head"><div class="card-title">Registrar Trago</div></div>
        <div style="padding:20px">
          <div class="fl"><label>Semana operativa</label><input type="text" id="s-wk" placeholder="ej: Semana 24" value="${window._wkFilter !== 'all' ? window._wkFilter : ''}"></div>
          <div class="fl"><label>Selecciona Cóctel</label><select id="s-co">${rOpts}</select></div>
          <div class="fl"><label>Cantidad Vendida</label><input type="number" id="s-qty" value="1" min="1"></div>
          <button class="btn btn-coral" id="btn-save" style="width:100%;justify-content:center;margin-top:10px" onclick="saveSale()"><i class="ti ti-plus"></i> Registrar en la barra</button>
        </div>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="card-title">Historial de Salidas</div>
          <select class="sel" style="width:auto;padding:4px 10px;font-size:12px" onchange="window._wkFilter=this.value;render()">${wkOpts}</select>
        </div>
        <table>
          <thead>
            <tr><th>Cóctel</th><th>Categoría</th><th style="text-align:center">Cant.</th><th>Semana</th><th>Descuento de Insumo</th><th style="text-align:right">Acción</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function rRecetas() {
  const cards = recipes.map(r => {
    const ings = r.recipe_ingredients && r.recipe_ingredients.length ? r.recipe_ingredients.map(i => {
      const sp = spirits.find(x => x.id === i.id_spirit);
      return `<div style="font-size:12px;margin-bottom:4px;display:flex;justify-content:between;color:var(--color-text-secondary)">
        <span>• ${sp ? sp.name : i.id_spirit}</span>
        <span style="color:var(--color-amber);font-weight:600">${i.ml} ml</span>
      </div>`;
    }).join('') : '<div class="empty" style="padding:0;text-align:left">Sin ingredientes configurados</div>';
    
    return `<div class="card" style="margin-bottom:14px">
      <div class="card-head"><div><div class="card-title">${r.name}</div><div class="card-sub">${r.cat}</div></div><span class="tag">${r.id}</span></div>
      <div style="padding:16px;background:rgba(0,0,0,0.1)">${ings}</div>
    </div>`;
  }).join('');
  
  return `<div class="page-title">Fichas Técnicas y Recetas</div>
    <div class="page-sub">Consulta las dosificaciones exactas de cada preparación</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px">${cards}</div>`;
}

function rCatalogo() {
  const rows = spirits.map(sp => {
    return `<tr>
      <td style="font-weight:600">${sp.name}</td>
      <td><span class="tag">${sp.cat}</span></td>
      <td style="text-align:center">${sp.ml} ml</td>
      <td style="text-align:center;font-weight:600;color:var(--color-amber)">${sp.stock}</td>
      <td style="text-align:right">
        <div style="display:inline-flex;gap:4px">
          <input type="number" class="add-input" id="add-${sp.id}" value="1" min="0" step="0.1">
          <button class="btn btn-sm btn-coral" onclick="addStock('${sp.id}')"><i class="ti ti-plus"></i> Reponer</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  return `<div class="page-title">Catálogo Base de Licores</div>
    <div class="page-sub">Ajusta el ingreso de botellas completas compradas para el almacén</div>
    <div class="card">
      <table>
        <thead>
          <tr><th>Nombre de Botella</th><th>Categoría</th><th style="text-align:center">Volumen</th><th style="text-align:center">Stock Inicial</th><th style="text-align:right">Ingreso de Botella</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ==========================================================================
// CONTROLADORES DE EVENTOS Y ACCIONES (SUPABASE)
// ==========================================================================
async function saveSale() {
  const week = (document.getElementById('s-wk').value || '').trim();
  const cocktail_id = document.getElementById('s-co').value;
  const qty = parseInt(document.getElementById('s-qty').value) || 0;
  
  if (!week) { alert('Ingresa la semana operativa (ej: Semana 1).'); return; }
  if (!cocktail_id || qty <= 0) return;
  
  const btn = document.getElementById('btn-save');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2 ti-spin"></i> Guardando...'; }
  
  const { data, error } = await sb.from('sales').insert({ cocktail_id, qty, week }).select();
  if (error) { 
    alert('Error al guardar venta: ' + error.message); 
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-plus"></i> Registrar venta'; } 
    return; 
  }
  
  sales.unshift(data[0]);
  updatePill();
  render();
}

async function delSale(id) {
  if (!confirm('¿Deseas eliminar este registro de venta?')) return;
  const { error } = await sb.from('sales').delete().eq('id', id);
  if (error) { alert('Error al eliminar: ' + error.message); return; }
  sales = sales.filter(s => s.id !== id);
  updatePill();
  render();
}

async function addStock(id) {
  const sp = spirits.find(s => s.id === id);
  if (!sp) return;
  const inp = document.getElementById('add-' + id);
  const qty = parseFloat(inp ? inp.value : 0) || 0;
  if (qty <= 0) return;
  
  const newStock = sp.stock + qty;
  const { error } = await sb.from('spirits').update({ stock: newStock }).eq('id', id);
  if (error) { alert('Error al actualizar stock: ' + error.message); return; }
  
  sp.stock = newStock;
  render();
}

// Encendido de la App
init();
</script>
</body>
</html>
