<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Bar - Clandestinna</title>
    <link rel="icon" type="image/png" href="logo_yellow_only.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            /* ── Speakeasy Palette ── */
            --bg:#FAF6F0;
            --bg2:#F0E8DC;
            --bg3:#E8DDD0;
            --txt:#1A1008;
            --txt2:#6B5A46;
            --txt3:#A8937A;
            --bdr:rgba(107,31,42,0.12);
            --bdr2:rgba(107,31,42,0.22);
            --accent:#B8935A;
            --accent-l:#F5EDD8;
            --accent-m:#D4AC72;
            --burg:#6B1F2A;
            --burg2:#8A2837;
            --burg3:#4A1520;
            --gold:#B8935A;
            --gold2:#D4AC72;
            --font:'Inter','Segoe UI',sans-serif;
            --font-serif:'Playfair Display',Georgia,serif;
            --r:8px;--r2:12px;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font);background:var(--bg3);color:var(--txt);min-height:100vh;font-weight:300}

        /* ── TOPBAR ── */
        .topbar{background:var(--bg);border-bottom:1px solid var(--bdr2);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(107,31,42,0.06)}
        .logo-icon{width:34px;height:34px;background:var(--burg);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:var(--gold2);font-size:16px;flex-shrink:0;box-shadow:0 2px 6px rgba(107,31,42,0.25)}
        .logo-name{font-size:16px;font-weight:600;font-family:var(--font-serif);color:var(--burg);letter-spacing:.01em}.logo-sub{font-size:11px;color:var(--txt2);font-weight:300}
        .pill{background:var(--accent-l);color:var(--burg);font-size:11px;font-weight:500;padding:3px 12px;border-radius:20px;border:0.5px solid var(--gold);font-family:var(--font)}

        /* ── LAYOUT ── */
        .layout{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 57px)}
        .sidebar{background:var(--burg);border-right:none;padding:16px 10px;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;box-shadow:2px 0 16px rgba(26,16,8,0.15)}
        .nav-lbl{font-size:9px;font-weight:500;color:rgba(255,220,180,0.45);text-transform:uppercase;letter-spacing:.1em;padding:0 10px;margin-bottom:5px;margin-top:14px}
        .nav-lbl:first-child{margin-top:0}
        .nav-btn{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--r);cursor:pointer;font-size:13px;color:rgba(240,220,200,0.75);margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:var(--font);transition:all .15s;font-weight:300}
        .nav-btn:hover{background:rgba(255,255,255,0.08);color:rgba(255,230,190,1)}
        .nav-btn.active{background:rgba(184,147,90,0.22);color:var(--gold2);font-weight:500;border-left:2px solid var(--gold2);padding-left:10px}
        .nav-badge{margin-left:auto;background:#D64545;color:#fff;font-size:10px;font-weight:600;line-height:1;padding:3px 6px;border-radius:20px;box-shadow:0 0 0 1px rgba(255,255,255,0.15)}
        .main{padding:22px;min-width:0}

        /* ── TYPOGRAPHY ── */
        .page-title{font-size:20px;font-weight:500;margin-bottom:4px;font-family:var(--font-serif);color:var(--burg);letter-spacing:-.01em}
        .page-sub{font-size:13px;color:var(--txt2);margin-bottom:20px;font-weight:300}

        /* ── STATS ── */
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
        .stat{background:var(--bg);border:0.5px solid var(--bdr2);border-radius:var(--r2);padding:14px 16px;box-shadow:0 1px 4px rgba(107,31,42,0.05)}
        .stat-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-weight:400}
        .stat-val{font-size:28px;font-weight:400;line-height:1;font-family:var(--font-serif)}

        /* ── CARDS ── */
        .card{background:var(--bg);border:0.5px solid var(--bdr2);border-radius:var(--r2);overflow:hidden;margin-bottom:14px;box-shadow:0 2px 8px rgba(107,31,42,0.06)}
        .card-head{padding:13px 18px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:8px;background:linear-gradient(to right,rgba(240,232,220,0.5),transparent)}
        .card-title{font-size:13px;font-weight:500;font-family:var(--font-serif);color:var(--burg)}.card-sub{font-size:11px;color:var(--txt2);font-weight:300}

        /* ── TABLE ── */
        table{width:100%;border-collapse:collapse;font-size:13px}
        th{text-align:left;padding:9px 14px;font-size:9.5px;color:var(--txt3);font-weight:500;text-transform:uppercase;letter-spacing:.06em;border-bottom:0.5px solid var(--bdr);white-space:nowrap}
        td{padding:9px 14px;border-bottom:0.5px solid rgba(107,31,42,0.07);vertical-align:middle;font-weight:300}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:rgba(240,232,220,0.5)}

        /* ── BADGES ── */
        .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
        .b-ok{background:#EAF3DE;color:#3B6D11}.b-warn{background:#FAEEDA;color:#854F0B}
        .b-crit{background:#FCEBEB;color:#A32D2D}.b-zero{background:#F7C1C1;color:#791F1F}

        /* ── BUTTONS ── */
        .btn{padding:7px 14px;border:0.5px solid var(--bdr2);border-radius:var(--r);background:var(--bg);color:var(--txt);font-size:12px;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;font-weight:400}
        .btn:hover{background:var(--bg2);border-color:var(--gold)}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .btn-coral{background:var(--burg);color:#FAF6F0;border-color:var(--burg);font-weight:400;letter-spacing:.01em;box-shadow:0 2px 6px rgba(107,31,42,0.2)}.btn-coral:hover{background:var(--burg2);border-color:var(--burg2);opacity:1}
        .btn-sm{padding:4px 9px;font-size:11px}
        .btn-ghost{border-color:transparent;background:none;color:var(--txt2)}.btn-ghost:hover{background:var(--bg2)}
        .btn-danger-sm{padding:4px 8px;font-size:11px;background:rgba(163,45,45,0.07);color:#A32D2D;border:0.5px solid rgba(163,45,45,0.18);border-radius:6px;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:3px;font-weight:300}
        .btn-outline-danger{padding:7px 14px;border:0.5px solid rgba(163,45,45,0.3);border-radius:var(--r);background:rgba(163,45,45,0.05);color:#A32D2D;font-size:12px;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;font-weight:400}
        .btn-outline-danger:hover{background:rgba(163,45,45,0.12);border-color:#A32D2D}
        .btn-outline-danger .count-chip{background:#A32D2D;color:#fff;font-size:10px;font-weight:600;line-height:1;padding:2px 6px;border-radius:20px;box-shadow:0 0 0 1px rgba(255,255,255,0.25)}

        /* ── EXPORT DROPDOWN (botón único con opciones) ── */
        .export-dropdown{position:relative;display:inline-block}
        .export-dropdown .btn-coral i.ti-chevron-down{font-size:12px;margin-left:1px;transition:transform .15s}
        .export-dropdown.open .btn-coral i.ti-chevron-down{transform:rotate(180deg)}
        .export-menu{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg);border:0.5px solid var(--bdr2);border-radius:var(--r2);box-shadow:0 8px 24px rgba(26,16,8,0.18);min-width:230px;z-index:60;overflow:hidden;opacity:0;transform:translateY(-6px);pointer-events:none;transition:all .15s ease}
        .export-dropdown.open .export-menu{opacity:1;transform:translateY(0);pointer-events:auto}
        .export-menu-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;background:none;border:none;border-bottom:0.5px solid var(--bdr);cursor:pointer;text-align:left;font-family:var(--font)}
        .export-menu-item:last-child{border-bottom:none}
        .export-menu-item:hover{background:var(--bg2)}
        .export-menu-item i{font-size:16px;color:var(--burg);flex-shrink:0}
        .export-menu-item-title{font-size:12.5px;font-weight:500;color:var(--txt)}
        .export-menu-item-sub{font-size:10.5px;color:var(--txt3);font-weight:300;margin-top:1px}
        .export-menu-item-txt{flex:1;min-width:0}
        .export-menu-count{background:var(--bg3);color:var(--txt2);font-size:10.5px;font-weight:600;line-height:1;padding:3px 8px;border-radius:20px;flex-shrink:0}
        .export-menu-item.is-danger i{color:#A32D2D}
        .export-menu-item.is-danger .export-menu-count{background:#A32D2D;color:#fff}
        .btn-danger-sm:hover{background:#F7C1C1}

        /* ── FORMS ── */
        .fl{margin-bottom:10px}
        .fl label{font-size:10px;color:var(--txt3);display:block;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.07em}
        .fl input,.fl select,input.inp,select.sel{padding:8px 10px;border:0.5px solid var(--bdr2);border-radius:var(--r);background:var(--bg);color:var(--txt);font-size:13px;font-family:var(--font);width:100%;font-weight:300}
        .fl input:focus,.fl select:focus,input.inp:focus,select.sel:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(184,147,90,0.12)}

        /* ── MISC ── */
        .alert-bar{background:rgba(107,31,42,0.06);border:0.5px solid rgba(107,31,42,0.2);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:13px;color:var(--burg);font-weight:400}
        .section-p{padding:18px}
        .two-col{display:grid;grid-template-columns:280px 1fr;gap:14px;align-items:start}
        .tag{display:inline-block;background:var(--accent-l);color:var(--burg);border-radius:5px;padding:2px 7px;font-size:11px;margin:2px;border:0.5px solid rgba(184,147,90,0.3);font-weight:300}
        .empty{text-align:center;padding:28px;color:var(--txt3);font-size:13px}
        .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
        .bottle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px}
        .bottle-card{background:var(--bg);border:0.5px solid var(--bdr);border-radius:10px;padding:14px 10px 12px;text-align:center;transition:all .2s;box-shadow:0 1px 4px rgba(107,31,42,0.05)}
        .bottle-card:hover{border-color:var(--gold);box-shadow:0 4px 12px rgba(107,31,42,0.1);transform:translateY(-1px)}
        .b-name{font-size:11px;font-weight:500;margin-top:8px;line-height:1.3;font-family:var(--font-serif);color:var(--txt)}
        .b-cat{font-size:10px;color:var(--txt3);margin-top:2px;font-weight:300;letter-spacing:.02em}
        .b-info{font-size:10px;color:var(--txt2);margin-top:4px}
        .wk-tag{background:rgba(184,147,90,0.12);color:var(--burg);border-radius:5px;padding:2px 7px;font-size:11px;font-weight:500;border:0.5px solid rgba(184,147,90,0.25)}
        .ml-chip{display:inline-block;background:var(--bg2);border-radius:4px;padding:1px 6px;font-size:10px;margin:1px;color:var(--txt2)}

        /* ── TABLE SCROLL CONTAINER (altura fija + encabezado pegajoso) ── */
        .table-scroll{max-height:460px;overflow-y:auto;overflow-x:auto}
        .table-scroll thead th{position:sticky;top:0;background:var(--bg);z-index:2;box-shadow:0 1px 0 var(--bdr)}

        /* ── SEGMENTED CONTROL ── */
        .seg{display:flex;background:var(--bg2);padding:3px;border-radius:var(--r);margin-bottom:10px;gap:2px;border:0.5px solid var(--bdr)}
        .seg button{flex:1;background:none;border:none;padding:6px 4px;font-size:11px;font-weight:400;color:var(--txt2);cursor:pointer;border-radius:6px;transition:all .15s;font-family:var(--font);white-space:nowrap}
        .seg button.active{background:var(--burg);color:var(--gold2);box-shadow:0 1px 4px rgba(107,31,42,0.2);font-weight:500}

        /* ── CASCADE SUB-FILTERS ── */
        .sub-filter-wrap{margin-bottom:10px;animation:fadeSlide .2s ease}
        @keyframes fadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
        .sub-filter-label{font-size:9.5px;font-weight:500;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block}
        .chip-row{display:flex;flex-wrap:wrap;gap:5px}
        .chip{padding:5px 12px;background:var(--bg);border:0.5px solid var(--bdr2);border-radius:20px;font-size:11px;color:var(--txt2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--font);font-weight:300}
        .chip:hover{background:var(--bg2);border-color:var(--gold)}
        .chip.active{background:var(--burg);color:var(--gold2);border-color:var(--burg);font-weight:500}
        .chip-all{background:var(--bg2)}

        /* ── RECIPE FILTER TABS ── */
        .filter-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
        .tab-btn{padding:6px 14px;background:var(--bg);border:0.5px solid var(--bdr2);border-radius:20px;font-size:11px;color:var(--txt2);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--font);font-weight:300}
        .tab-btn:hover{background:var(--bg2);border-color:var(--gold)}
        .tab-btn.active{background:var(--burg);color:var(--gold2);border-color:var(--burg);font-weight:500}

        /* ── COLLAPSIBLE TABLE ── */
        .collapsible-content{transition:max-height .35s ease,opacity .25s;opacity:1;overflow-y:auto}
        .collapsible-content.expanded{max-height:520px}
        .collapsible-content.collapsed{max-height:220px;opacity:1}
        .collapse-btn{padding:5px 10px;background:none;border:0.5px solid var(--bdr2);border-radius:var(--r);color:var(--txt2);cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:4px;font-family:var(--font);transition:all .15s;font-weight:300}
        .collapse-btn:hover{background:var(--bg2);border-color:var(--gold)}

        /* ── PROGRESS ── */
        .prog{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;border:0.5px solid var(--bdr)}
        .prog-fill{height:100%;border-radius:2px;transition:width .3s}

        /* ── LOADING ── */
        .spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(107,31,42,0.15);border-top-color:var(--burg);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading{text-align:center;padding:48px;color:var(--txt2);font-family:var(--font-serif);font-weight:400}
        /* ── REPORTS ── */
        @media(max-width:700px){
          .rep-grid{grid-template-columns:1fr!important}
          .stats-row{grid-template-columns:repeat(2,1fr)!important}
        }

        /* ── AUTH LOGIN OVERLAY ── */
        #auth-overlay{
          position:fixed;inset:0;z-index:9999;
          background:linear-gradient(135deg,#0D0408 0%,#1A0A0F 50%,#2A0D18 100%);
          display:flex;align-items:center;justify-content:center;
          font-family:'Inter','Segoe UI',sans-serif;
        }
        #auth-overlay.hidden{display:none}
        .auth-box{
          width:100%;max-width:380px;padding:48px 40px;
          background:rgba(255,255,255,0.03);
          border:0.5px solid rgba(184,147,90,0.25);
          border-radius:16px;
          box-shadow:0 24px 64px rgba(0,0,0,0.6),0 0 0 1px rgba(184,147,90,0.08);
        }
        .auth-logo{text-align:center;margin-bottom:32px}
        .auth-logo img{height:52px;width:auto;object-fit:contain;filter:brightness(0) invert(1) sepia(1) saturate(0.4) hue-rotate(340deg)}
        .auth-title{font-size:20px;font-weight:400;color:#F5EDD8;font-family:'Playfair Display',Georgia,serif;text-align:center;margin-bottom:6px;letter-spacing:.02em}
        .auth-sub{font-size:12px;color:rgba(184,147,90,0.6);text-align:center;margin-bottom:32px;letter-spacing:.05em;text-transform:uppercase}
        .auth-field{margin-bottom:16px}
        .auth-field label{display:block;font-size:10px;color:rgba(184,147,90,0.7);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:400}
        .auth-field input{
          width:100%;padding:11px 14px;
          background:rgba(255,255,255,0.05);
          border:0.5px solid rgba(184,147,90,0.2);
          border-radius:8px;color:#F5EDD8;font-size:14px;
          font-family:'Inter',sans-serif;font-weight:300;
          transition:border-color .2s,box-shadow .2s;outline:none;
        }
        .auth-field input::placeholder{color:rgba(255,255,255,0.2)}
        .auth-field input:focus{border-color:rgba(184,147,90,0.6);box-shadow:0 0 0 3px rgba(184,147,90,0.08)}
        .auth-btn{
          width:100%;margin-top:24px;padding:12px;
          background:linear-gradient(135deg,#6B1F2A,#8A2837);
          color:#F5EDD8;border:none;border-radius:8px;
          font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
          cursor:pointer;font-family:'Inter',sans-serif;
          transition:opacity .15s,transform .1s;
          box-shadow:0 4px 16px rgba(107,31,42,0.4);
        }
        .auth-btn:hover{opacity:.88}
        .auth-btn:active{transform:scale(.98)}
        .auth-btn:disabled{opacity:.4;cursor:not-allowed}
        .auth-error{
          margin-top:14px;padding:10px 14px;
          background:rgba(163,45,45,0.15);
          border:0.5px solid rgba(163,45,45,0.3);
          border-radius:8px;color:#FFA8A8;
          font-size:12px;text-align:center;display:none;
        }
        .auth-error.show{display:block}
        /* ── TOPBAR user badge ── */
        #user-badge{display:none;align-items:center;gap:10px}
        #user-badge.show{display:flex}
        .user-role-tag{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;padding:2px 8px;border-radius:20px;background:rgba(184,147,90,0.15);color:var(--gold2);border:0.5px solid rgba(184,147,90,0.3)}
        .logout-btn{background:none;border:0.5px solid rgba(107,31,42,0.3);border-radius:6px;color:var(--txt2);padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--font);transition:all .15s}
        .logout-btn:hover{background:rgba(107,31,42,0.06);color:var(--burg)}
        /* ── Role visibility helpers ── */
        .role-admin-only{display:none}
        .role-hide-bartender{} /* default visible */
    </style>
</head>
<body>

<!-- ── AUTH OVERLAY ─────────────────────────────────────── -->
<div id="auth-overlay">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="logo_transparent.png" alt="Clandestinna">
    </div>
    <div class="auth-title">Acceso al Sistema</div>
    <div class="auth-sub">Control de Inventario · Clandestinna</div>
    <div class="auth-field">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="correo@clandestinna.com" autocomplete="email">
    </div>
    <div class="auth-field">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="auth-btn" id="login-btn" onclick="login()">
      <i class="ti ti-lock-open" style="margin-right:6px"></i>Iniciar sesión
    </button>
    <div class="auth-error" id="login-error"></div>
  </div>
</div>
<!-- ──────────────────────────────────────────────────────── -->

<div class="topbar">
  <div style="display:flex;align-items:center;width:220px">
    <img src="logo_transparent.png" alt="Clandestinna"
         style="height:50px;width:auto;max-width:220px;object-fit:contain;display:block;filter:brightness(0) saturate(0) invert(0.15)">
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div id="top-pill" class="pill">Conectando...</div>
    <div id="user-badge">
      <span id="user-name-lbl" style="font-size:12px;color:var(--txt2);font-weight:300"></span>
      <span id="user-role-lbl" class="user-role-tag"></span>
      <button class="logout-btn" onclick="logout()"><i class="ti ti-logout" style="font-size:12px"></i> Salir</button>
    </div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div style="padding:12px 10px 16px;border-bottom:0.5px solid rgba(255,255,255,0.1);margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px">

// ═══════════════════════════════════════════════════════════
// HELPERS — Product type inference
// ═══════════════════════════════════════════════════════════
function inferProductType(cat){
  const c=String(cat||'').toLowerCase();
  if(c.includes('sin alcohol')||c==='sin alcohol') return 'sin_alcohol';
  if(c.includes('vino')||c.includes('champagne')||c.includes('espumoso')||c.includes('sake')) return 'vino';
  if(c.includes('cerveza')) return 'cerveza';
  if(c.includes('agua')) return 'agua';
  if(c.includes('refresco')) return 'refrescos';
  if(['tequila','mezcal','sotol','ron','vodka','whisky','ginebra','cognac','brandy','pisco','jerez'].some(k=>c.includes(k))) return 'destilado';
  return 'licor';
}

// ═══════════════════════════════════════════════════════════
// STOCK CALCULATION — Mixed ml + units logic
// ═══════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
// STOCK CALCULATION — Uses reportHistory (permanent) NOT sales (mutable)
// Deleting a sale from the sales table does NOT revert stock because
// report_history is the source of truth for consumption.
// ═══════════════════════════════════════════════════════════
function _getStockSource(){
  // If reportHistory has records, use it (permanent record).
  // Fallback to sales only if reportHistory is empty (first run / contingency).
  return (reportHistory && reportHistory.length > 0) ? reportHistory : sales;
}

function getConsumedML(sid){
  return _getStockSource().reduce((t,s)=>{
    const mode=s.sale_mode||'coctel';
    if(mode==='coctel'){
      const r=recipes.find(r=>r.id===s.cocktail_id);
      if(!r) return t;
      const ing=r.ings.find(i=>i.id===sid);
      return t+(ing?(s.qty||1)*ing.ml:0);
    }
    if(mode==='shot' && s.cocktail_id===sid) return t+(s.qty||1)*60;
    if(mode==='copa' && s.cocktail_id===sid) return t+(s.qty||1)*150;
    return t;
  },0);
}

function getConsumedUnits(sid){
  return _getStockSource().reduce((t,s)=>{
    const mode=s.sale_mode||'coctel';
    if((mode==='botella'||mode==='pieza') && s.cocktail_id===sid) return t+(s.qty||1);
    return t;
  },0);
}

// ═══════════════════════════════════════════════════════════
// TRASPASOS — bodega → barra (fuente permanente: tabla `transfers`)
// Igual que report_history, esto NUNCA se revierte solo; es el
// registro físico real de "se llevó una botella de bodega a la barra".
// ═══════════════════════════════════════════════════════════
function getTransferredIn(sid){
  return transfers.reduce((t,x)=>t+(x.spirit_id===sid?parseFloat(x.qty)||0:0),0);
}
// Stock efectivo EN BARRA = lo que inició en barra + todo lo que ha llegado de bodega.
// Sobre esto se resta el consumo de ventas (igual que antes).
function getEffectiveBarraStock(sp){
  return (parseFloat(sp.stock_barra)||0)+getTransferredIn(sp.id);
}
// Stock efectivo EN BODEGA = lo que inició en bodega - todo lo que ya salió hacia barra.
function getEffectiveBodegaStock(sp){
  return Math.max(0,(parseFloat(sp.stock_bodega)||0)-getTransferredIn(sp.id));
}
function getBodegaPct(sp){
  const initial=parseFloat(sp.stock_bodega)||0;
  if(initial<=0) return 0;
  return Math.max(0,Math.min(1,getEffectiveBodegaStock(sp)/initial));
}

function getRemainingBottles(sp){
  const barraStock=getEffectiveBarraStock(sp);
  if(sp.product_type==='cerveza'||sp.product_type==='agua'||sp.product_type==='refrescos'){
    return barraStock-getConsumedUnits(sp.id);
  }
  const mlDrained=getConsumedML(sp.id)/sp.ml;
  const unitsSold=getConsumedUnits(sp.id);
  return barraStock-(mlDrained+unitsSold);
}

function getRemainingPct(sp){
  const rem=getRemainingBottles(sp);
  if(rem<=0) return 0;
  const isPiece=(sp.product_type==='cerveza'||sp.product_type==='agua'||sp.product_type==='refrescos');
  if(isPiece){
    // Piezas: % de las unidades iniciales (en barra) que quedan
    const barraStock=getEffectiveBarraStock(sp);
    return barraStock===0?0:Math.min(1,rem/barraStock);
  }
  // Botellas/licores: rem ya es la fracción física de botella disponible.
  // 0.23 → 23%, 0.75 → 75%, 1.0+ → 100% (botella llena o más de una)
  return Math.min(1, rem);
}

// ═══════════════════════════════════════════════════════════
// STOCK COMBINADO (barra + bodega) — para el reporte de compras.
// A diferencia de getRemainingBottles/getRemainingPct (que solo ven
// la barra, porque de ahí se vende), esto ve el TOTAL físico real que
// queda en el negocio, que es lo que importa para decidir si hay que
// comprar más o no. Los traspasos se cancelan entre sí en el total.
// ═══════════════════════════════════════════════════════════
function getCombinedRemaining(sp){
  return getRemainingBottles(sp)+getEffectiveBodegaStock(sp);
}
function getCombinedInitial(sp){
  return (parseFloat(sp.stock_barra)||0)+(parseFloat(sp.stock_bodega)||0);
}
function getCombinedPct(sp){
  const initial=getCombinedInitial(sp);
  if(initial<=0) return 0;
  return Math.max(0,Math.min(1,getCombinedRemaining(sp)/initial));
}
// Reporte de compras: "necesita reposición" ahora usa la MISMA lógica de
// cantidad física que el Dashboard (dashStatus) — no depende de tener
// historial de ventas para funcionar, así sirve desde el primer día.
function needsReorder(sp){
  return dashStatus(sp).cls!=='b-ok';
}

// Total histórico consumido de un producto, en botellas/piezas equivalentes
// (fuente permanente: report_history — no se revierte al borrar una venta).
function getTotalConsumedBottles(sp){
  return getConsumedML(sp.id)/sp.ml+getConsumedUnits(sp.id);
}

// ═══════════════════════════════════════════════════════════
// CONSUMO SEMANAL DETECTADO — promedio real de botellas/piezas
// vendidas por semana, calculado dividiendo el consumo histórico
// total del producto entre las semanas transcurridas desde su
// primer registro en report_history (fuente permanente).
// ═══════════════════════════════════════════════════════════
function getWeeklyConsumptionRate(sp){
  const total=getTotalConsumedBottles(sp);
  if(total<=0) return 0;
  const source=_getStockSource();
  const dated=source.filter(r=>r.created_at).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  if(!dated.length) return 0;
  const start=new Date(dated[0].created_at).getTime();
  const weeksElapsed=Math.max(1, (Date.now()-start)/(7*24*60*60*1000));
  return total/weeksElapsed;
}

// Cantidad sugerida a comprar: cubrir el consumo de una semana (lo que el
// sistema detecta que se vende), descontando lo que ya queda disponible
// (barra+bodega). Si el producto todavía no tiene historial de ventas,
// se usa como respaldo el nivel de stock originalmente cargado.
function getSuggestedRestock(sp){
  const weeklyRate=getWeeklyConsumptionRate(sp);
  const current=getCombinedRemaining(sp);
  if(weeklyRate>0){
    return{qty:Math.max(0,Math.ceil(weeklyRate-current-1e-9)), weeklyRate, basis:'weekly'};
  }
  const initial=getCombinedInitial(sp);
  return{qty:Math.max(0,Math.ceil(initial-current-1e-9)), weeklyRate:0, basis:'initial'};
}

// status() recibe el spirit completo para diferenciar por product_type.
// Piezas (cerveza/agua): bajo si quedan < 5 unidades absolutas.
// Licores/destilados/vinos: bajo si quedan < 0.50 botellas (tu umbral).
function status(sp_or_p, remainingBottles){
  // Soporte legacy: si se llama con solo un número (porcentaje), usar lógica original
  if(typeof sp_or_p === 'number'){
    const p=sp_or_p;
    if(p<=0) return{cls:'b-zero',lbl:'Agotado'};
    if(p>=0.5) return{cls:'b-ok',lbl:'OK'};
    if(p>=0.25) return{cls:'b-warn',lbl:'Bajo'};
    return{cls:'b-crit',lbl:'Crítico'};
  }
  const sp=sp_or_p;
  const rem=remainingBottles!=null?remainingBottles:getRemainingBottles(sp);
  // Agotado universal: 0 en cualquier tipo
  if(rem<=0) return{cls:'b-zero',lbl:'Agotado'};
  const isPiece=(sp.product_type==='cerveza'||sp.product_type==='agua'||sp.product_type==='refrescos');
  if(isPiece){
    // Piezas: bajo si quedan 2 o menos
    if(rem<=2) return{cls:'b-crit',lbl:'Bajo'};
    return{cls:'b-ok',lbl:'OK'};
  }
  // Licores, destilados, vinos: bajo si quedan 0.50 botellas o menos
  if(rem>0.5) return{cls:'b-ok',lbl:'OK'};
  return{cls:'b-crit',lbl:'Bajo'};
}

// ═══════════════════════════════════════════════════════════
// ESTADO PARA DASHBOARD — versión "consciente de bodega".
// Si la barra está baja/vacía pero la bodega tiene un respaldo sano (por
// encima de su propio umbral de "bajo": 1 botella / 2 piezas), NO se marca
// como "Bajo" — solo falta un traspaso, no hay urgencia real. Solo se marca
// "Bajo" cuando la bodega TAMBIÉN está corta (2 piezas o menos, 1 botella o
// menos). "Agotado" sigue siendo cuando no queda nada en ningún lado.
// Aplica igual para botellas, cerveza, agua y refrescos.
// ═══════════════════════════════════════════════════════════
function dashStatus(sp){
  if(getCombinedRemaining(sp)<=0) return{cls:'b-zero',lbl:'Agotado'};
  const rem=getRemainingBottles(sp);
  const barraSt=status(sp,rem);
  if(barraSt.cls==='b-ok') return barraSt; // la barra sola ya está bien
  const isPiece=(sp.product_type==='cerveza'||sp.product_type==='agua'||sp.product_type==='refrescos');
  const bodegaThreshold=isPiece?2:1;
  const bodegaStock=getEffectiveBodegaStock(sp);
  if(bodegaStock>bodegaThreshold) return{cls:'b-ok',lbl:'OK'}; // barra baja, pero bodega con respaldo de sobra
  return{cls:'b-crit',lbl:'Bajo'};
}

function bottleSVG(p){
  const W=32,H=72,c=p<=0?'#F09595':p>=0.5?'#639922':p>=0.25?'#BA7517':'#E24B4A';
  const fH=Math.round((H-14)*Math.max(0,Math.min(1,p))),fY=H-4-fH;
  const uid='sv'+Math.round(p*1000)+'x'+Math.round(Math.random()*9999);
  return`<svg width="${W}" height="${H+12}" viewBox="0 0 ${W} ${H+12}" style="display:block;margin:0 auto" aria-hidden="true">
    <defs><clipPath id="${uid}"><rect x="5" y="12" width="${W-10}" height="${H-12}" rx="3"/></clipPath></defs>
    <rect x="11" y="2" width="${W-22}" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1" opacity=".2"/>
    <rect x="5" y="12" width="${W-10}" height="${H-12}" rx="3" fill="none" stroke="currentColor" stroke-width="1" opacity=".15"/>
    <rect x="5" y="${fY}" width="${W-10}" height="${fH+4}" fill="${c}" opacity=".8" clip-path="url(#${uid})"/>
    <text x="${W/2}" y="${H+11}" text-anchor="middle" font-size="10" fill="currentColor" opacity=".6" font-family="system-ui">${Math.round(p*100)}%</text>
  </svg>`;
}

  const src=(typeof reportHistory!=='undefined'&&reportHistory&&reportHistory.length>0)?reportHistory:sales;
  const t=src.reduce((s,x)=>s+(x.qty||1),0);
  document.getElementById('top-pill').textContent=`${t} unidades vendidas`;
}

// Badge discreto en el menú lateral — reemplaza los banners de alerta

function updateNavBadges(){

    badge.title=count+' producto(s) al 20% o menos — revisa el reporte de compras';

    badge.style.display='none';
  }
}

// DASHBOARD
// ═══════════════════════════════════════════════════════════
function rDash(){
  let ok=0,warn=0,crit=0,zero=0;
  spirits.forEach(sp=>{
    const st=dashStatus(sp);
    if(st.cls==='b-zero') zero++;
    else if(st.cls==='b-ok') ok++;
    else {warn++;}
  });
  const cats=[...new Set(spirits.map(s=>s.cat))].sort();
  const selOpts=`<option value="all">Todas las categorías</option>`+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  // Filtro de estado para el grid — mismo criterio que el conteo de arriba
  const dashStatusFilter=(sp)=>{
    if(_dashFilter==='all') return true; // "Todos" siempre debe mostrar el catálogo completo
    const st=dashStatus(sp);
    if(_dashFilter==='ok') return st.cls==='b-ok';
    if(_dashFilter==='bajo') return st.cls==='b-crit';
    if(_dashFilter==='agotado') return st.cls==='b-zero';
    return true;
  };
  // Ordenado por cantidad disponible en barra (de menor a mayor) — así lo más
  // urgente de atender aparece primero, en vez de orden alfabético.
  const cards=spirits.filter(dashStatusFilter).sort((a,b)=>getRemainingBottles(a)-getRemainingBottles(b)).map(sp=>{
    const rem=getRemainingBottles(sp);
    const st=dashStatus(sp);
    const isPiece=(sp.product_type==='cerveza'||sp.product_type==='agua'||sp.product_type==='refrescos');
    // Para botellas: pct = rem (0.23 → 23%, 2.89 → 100%)
    // Para piezas:   pct = rem/stock (cuántas de las iniciales quedan)
    const barraStock=getEffectiveBarraStock(sp);
    const pct=Math.max(0, isPiece?(barraStock===0?0:Math.min(1,rem/barraStock)):Math.min(1,rem));
    const unit=isPiece?'pzas':'botellas';
    const remML=isPiece?null:Math.round(rem*sp.ml);
    const bodegaStock=getEffectiveBodegaStock(sp);
    return`<div class="bottle-card" data-cat="${sp.cat}">

// Mode switcher (top segmented control)
function setMode(m){
  _weekInput=(document.getElementById('s-wk')?.value||_weekInput);
  _saleMode=m;
  render();
}

// Sub-filter setters — each updates its slice of state and re-renders
function setSubCoctel(v){_weekInput=(document.getElementById('s-wk')?.value||_weekInput);_subCoctel=v;render();}
function setSubShot(v){_weekInput=(document.getElementById('s-wk')?.value||_weekInput);_subShot=v;render();}
function setSubCopa(v){_weekInput=(document.getElementById('s-wk')?.value||_weekInput);_subCopa=v;render();}
function setSubBotella(v){_weekInput=(document.getElementById('s-wk')?.value||_weekInput);_subBotella=v;render();}
function setSubPieza(v){_weekInput=(document.getElementById('s-wk')?.value||_weekInput);_subPieza=v;render();}

function toggleSalesTable(){
  _salesCollapsed=!_salesCollapsed;
  const content=document.getElementById('sales-table-content');
  const icon=document.getElementById('collapse-icon');
  const lbl=document.getElementById('collapse-lbl');
  if(content){
    if(_salesCollapsed){
      content.classList.remove('expanded');
      content.classList.add('collapsed');
    }else{
      content.classList.remove('collapsed');
      content.classList.add('expanded');
    }
    if(icon) icon.className=_salesCollapsed?'ti ti-plus':'ti ti-minus';
    if(lbl) lbl.textContent=_salesCollapsed?'Expandir':'Minimizar';
  }
}

// Build chips helper
function chips(items,active,fn){
  return`<div class="chip-row">`+items.map(([label,val])=>
    `<button class="chip${active===val?' active':''}" onclick="${fn}('${val}')">${label}</button>`
  ).join('')+`</div>`;
}

// Build the cascaded product selector HTML
function buildCascadeSelector(){
  // ── CÓCTEL ──
  if(_saleMode==='coctel'){
    // Obtener todas las categorías únicas de recetas dinámicamente
    const recCats=[...new Set(recipes.map(r=>r.cat).filter(Boolean))].sort();
    // Si el sub-filtro actual no está en las cats disponibles, usar la primera
    if(recCats.length && !recCats.includes(_subCoctel)) _subCoctel=recCats[0];
    const filtered=_subCoctel
      ? recipes.filter(r=>r.cat===_subCoctel)
      : recipes;
    const opts=filtered.length
      ? filtered.map(r=>`<option value="recipe::${r.id}">${r.name}</option>`).join('')
      : `<option value="">Sin recetas en esta categoría</option>`;
    return`
      <div class="sub-filter-wrap">
        <span class="sub-filter-label">Tipo de cóctel</span>
        ${chips(recCats.map(c=>[c,c]),_subCoctel,'setSubCoctel')}
      </div>
      <div class="fl">
        <label>Seleccionar cóctel</label>
        <select id="s-co" style="width:100%">${opts}</select>
      </div>`;
  }

  // ── SHOT ── destilado | licor (60ml por shot)
  if(_saleMode==='shot'){
    // Filtrar directamente por product_type para incluir TODO lo del catálogo
    const filtered=spirits.filter(s=>{
      if(_subShot==='destilado') return s.product_type==='destilado';
      if(_subShot==='licor') return s.product_type==='licor';
      return false;
    });
    const opts=filtered.length
      ? filtered.map(s=>`<option value="spirit::${s.id}">${s.name} (${s.cat}) — ${s.ml}ml/bot</option>`).join('')
      : `<option value="">Sin productos en esta categoría</option>`;
    return`
      <div class="sub-filter-wrap">
        <span class="sub-filter-label">Tipo de producto</span>
        ${chips([['Destilados','destilado'],['Licores','licor']],_subShot,'setSubShot')}
      </div>
      <div class="fl">
        <label>Seleccionar botella — descuenta 60ml por shot</label>
        <select id="s-co" style="width:100%">${opts}</select>
      </div>`;
  }

  // ── COPA ── vinos 150ml por copa
  if(_saleMode==='copa'){
    const wineCats=['Vino Blanco','Vino Tinto','Vino Rosado','Vino Espumoso'];
    // Filtrar: product_type vino Y cat coincide con el chip seleccionado
    const filtered=spirits.filter(s=>s.product_type==='vino' && s.cat===_subCopa);
    // Si no hay vinos en la cat seleccionada, ajustar al primer chip que sí tenga
    const availableCats=wineCats.filter(c=>spirits.some(s=>s.product_type==='vino'&&s.cat===c));
    if(availableCats.length && !availableCats.includes(_subCopa)) _subCopa=availableCats[0];
    const filtered2=spirits.filter(s=>s.product_type==='vino' && s.cat===_subCopa);
    const opts=filtered2.length
      ? filtered2.map(s=>`<option value="spirit::${s.id}">${s.name} — ${s.ml}ml/bot</option>`).join('')
      : `<option value="">Sin vinos en esta categoría</option>`;
    return`
      <div class="sub-filter-wrap">
        <span class="sub-filter-label">Tipo de vino</span>
        ${chips(wineCats.map(c=>[c.replace('Vino ',''),c]),_subCopa,'setSubCopa')}
      </div>
      <div class="fl">
        <label>Seleccionar vino — descuenta 150ml por copa</label>
        <select id="s-co" style="width:100%">${opts}</select>
      </div>`;
  }

  // ── BOTELLA ── todas las familias de licor/vino/destilado
  if(_saleMode==='botella'){
    const eligibleTypes=['destilado','licor','vino'];
    const botCats=[...new Set(
      spirits.filter(s=>eligibleTypes.includes(s.product_type)).map(s=>s.cat)
    )].sort();
    if(!_subBotella && botCats.length) _subBotella=botCats[0];
    const filtered=spirits.filter(s=>s.cat===_subBotella&&eligibleTypes.includes(s.product_type));
    const opts=filtered.length
      ? filtered.map(s=>`<option value="spirit::${s.id}">${s.name} — ${s.ml}ml</option>`).join('')
      : `<option value="">Sin productos en esta familia</option>`;
    return`
      <div class="sub-filter-wrap">
        <span class="sub-filter-label">Tipo de producto</span>
        <div class="chip-row" style="flex-wrap:wrap">
          ${botCats.map(c=>`<button class="chip${_subBotella===c?' active':''}" onclick="setSubBotella('${c}')">${c}</button>`).join('')}
        </div>
      </div>
      <div class="fl">
        <label>Seleccionar botella — descuenta 1 unidad de stock</label>
        <select id="s-co" style="width:100%">${opts}</select>
      </div>`;
  }

  // ── PIEZA ── cerveza | agua/refresco
  if(_saleMode==='pieza'){
    const piezaCats={
      cerveza: ['Cerveza'],
      agua: ['Agua','Refresco','Refrescos','Otros']
    };
    const filtered=spirits.filter(s=>{
      const validCats=piezaCats[_subPieza]||[];
      return validCats.some(c=>s.cat===c) || (_subPieza==='cerveza'&&s.product_type==='cerveza') || (_subPieza==='agua'&&(s.product_type==='agua'||s.product_type==='refrescos'));
    });
    const opts=filtered.length
      ? filtered.map(s=>`<option value="spirit::${s.id}">${s.name} (${s.cat})</option>`).join('')
      : `<option value="">Sin productos en esta categoría</option>`;
    return`
      <div class="sub-filter-wrap">
        <span class="sub-filter-label">Categoría</span>
        ${chips([['Cerveza','cerveza'],['Agua / Refresco','agua']],_subPieza,'setSubPieza')}
      </div>
      <div class="fl">
        <label>Seleccionar pieza — descuenta 1 unidad de stock</label>
        <select id="s-co" style="width:100%">${opts}</select>
      </div>`;
  }

  return '';
}

function filterRecipeTab(cat){_recTabFilter=cat;render();}

function rRecetas(){
  const withPop=recipes.map(r=>({
    ...r,
    sold:sales.filter(s=>(s.sale_mode==='coctel'||!s.sale_mode)&&s.cocktail_id===r.id).reduce((t,s)=>t+(s.qty||1),0)
  }));
  const ranked=[...withPop].sort((a,b)=>b.sold-a.sold);
  const maxSold=ranked[0]?.sold||1;
  const cats=['all',...new Set(recipes.map(r=>r.cat))];

  const filterTabsHTML=`<div class="filter-tabs">
    ${cats.map(c=>`<button class="tab-btn ${_recTabFilter===c?'active':''}" onclick="filterRecipeTab('${c}')">${c==='all'?'Ver todo':c}</button>`).join('')}
  </div>`;

  const sections=cats.filter(c=>c!=='all').map(cat=>{
    if(_recTabFilter!=='all'&&_recTabFilter!==cat) return '';
    const list=ranked.filter(r=>r.cat===cat);
    if(!list.length) return '';
    const rows=list.map(r=>{
      const totalML=r.ings.reduce((t,i)=>t+i.ml,0);
      const mainIng=r.ings.length?r.ings.reduce((a,b)=>a.ml>=b.ml?a:b,r.ings[0]):null;
      const mainSp=mainIng?spirits.find(x=>x.id===mainIng.id):null;
      const rend=mainSp&&mainIng?`${Math.floor(mainSp.ml/mainIng.ml)} copas/bot`:'—';
      const popPct=maxSold>0?Math.round((r.sold/maxSold)*100):0;
      const ings=r.ings.map(i=>{const sp=spirits.find(x=>x.id===i.id);return`<span class="tag">${sp?sp.name:'?'} ${i.ml}ml</span>`;}).join('');
      return`<tr>
        <td style="font-weight:500">${r.name}</td>
        <td>${ings||'—'}</td>
        <td style="text-align:center;color:var(--accent);font-weight:500">${totalML}ml</td>
        <td style="text-align:center;font-size:11px;color:var(--txt2)">${rend}</td>
        <td style="text-align:center">
          <span style="font-weight:500">${r.sold}</span>
          ${r.sold>0?`<div class="prog" style="margin-top:4px"><div class="prog-fill" style="width:${popPct}%;background:var(--accent)"></div></div>`:''}
        </td>
      </tr>`;
    }).join('');
    return`<div class="card" style="margin-bottom:12px">
      <div class="card-head" style="cursor:pointer;user-select:none" onclick="_recCollapsed['${cat}']=!_recCollapsed['${cat}'];render()">
        <span class="card-title">${cat}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="card-sub">${list.length} cócteles</span>
          <button class="collapse-btn" onclick="event.stopPropagation();_recCollapsed['${cat}']=!_recCollapsed['${cat}'];render()" style="padding:2px 10px;font-size:11px;gap:4px">
            <i class="ti ${_recCollapsed[cat]?'ti-plus':'ti-minus'}"></i>
            <span>${_recCollapsed[cat]?'Expandir':'Minimizar'}</span>
          </button>
        </div>
      </div>
      ${_recCollapsed[cat]?'':`<div style="overflow-y:auto;max-height:280px;overflow-x:auto">
        <table style="min-width:520px"><thead><tr><th>Cóctel</th><th>Composición</th><th style="text-align:center">Vol total</th><th style="text-align:center">Rendimiento</th><th style="text-align:center">Vendidos</th></tr></thead><tbody>${rows}</tbody></table>
      </div>`}
    </div>`;
  }).join('');

  // Top 3 más vendidas
  const top3=ranked.filter(r=>r.sold>0).slice(0,3);
  const medals=['🥇','🥈','🥉'];
  const top3HTML=top3.length?`<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    ${top3.map((r,i)=>`<div style="flex:1;min-width:160px;background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r2);padding:12px 14px;display:flex;align-items:center;gap:10px">
      <span style="font-size:22px;line-height:1">${medals[i]}</span>
      <div>
        <div style="font-size:13px;font-weight:500">${r.name}</div>
        <div style="font-size:11px;color:var(--txt2)">${r.cat} · <span style="color:var(--accent);font-weight:500">${r.sold} Vendidos</span></div>
      </div>
    </div>`).join('')}
  </div>`:'';

  return`<div class="page-title">Recetario</div><div class="page-sub">Rendimiento volumétrico y popularidad por receta</div>
    ${top3HTML}${filterTabsHTML}${sections||'<div class="empty">Sin recetas en esta categoría</div>'}`;
}

// ── Número de semana ISO-8601 (lunes a domingo, semana 1 = la que contiene el 4 de enero)
function getISOWeek(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const dayNum=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()+4-dayNum);
  const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const weekNo=Math.ceil((((d-yearStart)/86400000)+1)/7);
  return{week:weekNo, year:d.getUTCFullYear()};
}
function formatWeekLabel(dateStr){
  if(!dateStr) return '—';
  const {week}=getISOWeek(new Date(dateStr));
  return`Semana ${week}`;
}

  // Filtra por ubicación (barra/bodega) — validación estricta contra lo guardado en BD
  const entriesLoc=stockEntries.filter(e=>e.location===location);
  // Filtra además por la familia seleccionada en el toolbar, igual que la tabla principal
  const entries=entriesLoc.filter(e=>{
    const sp=spirits.find(x=>x.id===e.spirit_id);
    return _cFilter==='all' || (sp && sp.cat===_cFilter);
  });
  const rows=entries.map(e=>{
    const sp=spirits.find(x=>x.id===e.spirit_id);
    const date=e.created_at?new Date(e.created_at).toLocaleString('es-MX',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
    const weekLbl=formatWeekLabel(e.created_at);
    return`<tr>
      <td style="font-weight:500">${sp?sp.name:'?'}</td>
      <td style="text-align:center;font-weight:500;color:#3B6D11">+${parseFloat(e.qty).toFixed(2)}</td>
      <td style="text-align:center"><span class="wk-tag">${weekLbl}</span></td>
      <td style="font-size:11px;color:var(--txt2);white-space:nowrap">${date}</td>
      <td style="font-size:11px;color:var(--txt2);white-space:nowrap">${e.created_by_name||e.created_by_email||'—'}</td>
    </tr>`;
  }).join('')||`<tr><td colspan="5" class="empty">Aún no hay altas registradas en ${location==='bodega'?'bodega':'barra'}</td></tr>`;

  return`
    <div class="card">
      <div class="card-head"><span class="card-title">Fecha de adquisición</span><span class="card-sub">Cada vez que se agrega stock (+) queda registrado aquí · ${entries.length} registro(s)</span></div>

function rCatalogoBarra(){
  const cats=[...new Set(spirits.map(s=>s.cat))].sort();
  const catOpts=`<option value="all">Todas</option>`+cats.map(c=>`<option value="${c}"${_cFilter===c?' selected':''}>${c}</option>`).join('');
  const spRaw=_cFilter==='all'?spirits:spirits.filter(s=>s.cat===_cFilter);
  const spList=[...spRaw].sort((a,b)=>{
    const rA=getRemainingBottles(a),rB=getRemainingBottles(b);
    const pA=getRemainingPct(a),pB=getRemainingPct(b);
    const cA=getConsumedML(a.id)/a.ml+getConsumedUnits(a.id);
    const cB=getConsumedML(b.id)/b.ml+getConsumedUnits(b.id);
    const stOrder={'b-ok':0,'b-warn':1,'b-crit':2,'b-zero':3};
    const d=_cSortDir;
    switch(_cSort){
      case 'name':    return d*a.name.localeCompare(b.name,'es');
      case 'cat':     return d*a.cat.localeCompare(b.cat,'es');
      case 'ml':      return d*(a.ml-b.ml);
      case 'stock':   return d*(getEffectiveBarraStock(a)-getEffectiveBarraStock(b));
      case 'consumed':return d*(cA-cB);
      case 'rem':     return d*(rA-rB);
      case 'level':   return d*(pA-pB);
      case 'status':  return d*((stOrder[status(pA).cls]||0)-(stOrder[status(pB).cls]||0));
      default:        return(rA>0&&rB<=0)?-1:(rA<=0&&rB>0)?1:0;
    }
  });

  const rows=spList.map(sp=>{
    const consumedML=getConsumedML(sp.id);
    const consumedUnits=getConsumedUnits(sp.id);
    const remBot=getRemainingBottles(sp);
    const p=getRemainingPct(sp);
    const st=status(sp,remBot);
    const fc=p<=0?'#F09595':p>=0.5?'#97C459':p>=0.25?'#EF9F27':'#E24B4A';

    const consumedStr=isPiece?`${consumedUnits} pzas`:`−${totalBtlConsumed.toFixed(2)} btl`;
    const consumedMLStr=(!isPiece&&consumedML>0)?`<span style="font-size:10px;color:#A32D2D;display:block">−${Math.round(consumedML)}ml</span>`:'';
    const remSub=isPiece?'Cerrado':`${Math.round(remBot*sp.ml)}ml`;
    const transferredIn=getTransferredIn(sp.id);
    const transferredNote=transferredIn>0?`<span style="font-size:9.5px;color:#3B6D11;font-weight:500;display:block">+${transferredIn.toFixed(2)} de bodega</span>`:'';
    return`<tr>
      <td style="font-weight:500">${sp.name}<br><span style="font-size:10px;color:var(--txt3);font-weight:400">${(sp.product_type||'').toUpperCase()}</span></td>
      <td><span style="background:var(--bg2);border-radius:5px;padding:2px 6px;font-size:11px">${sp.cat}</span></td>
      <td style="text-align:center">${sp.ml}ml</td>
      <td style="text-align:center;font-weight:500">${parseFloat(sp.stock_barra||0).toFixed(2)}</td>
      <td style="text-align:center;color:#A32D2D">${consumedStr}${consumedMLStr}</td>
      <td style="text-align:center"><span style="font-weight:500">${remBot.toFixed(2)}</span><span style="font-size:10px;color:var(--txt3);display:block">${remSub}</span>${transferredNote}</td>
      <td style="min-width:70px">
        <div class="prog"><div class="prog-fill" style="width:${Math.round(p*100)}%;background:${fc}"></div></div>
        <span style="font-size:10px;color:var(--txt2)">${Math.round(p*100)}%</span>

    <div class="card">

// REPORTES — Historical persistent log (Supabase: report_history)
// Desde ahora report_history es también la fuente donde se registran las
// ventas nuevas (antes se escribía primero en `sales` y se replicaba aquí).
// La tabla `sales` queda intacta en Supabase (no se borra, no se pierde
// nada de lo ya registrado) pero deja de recibir escrituras nuevas.
// ═══════════════════════════════════════════════════════════
let reportHistory = [];

/**
 * Reconstruye `sales` (lo que ve/usa la pestaña Ventas) a partir de
 * report_history, ocultando las filas marcadas como eliminadas
 * (deleted_at) SIN quitarlas de report_history. Así el frontend se
 * comporta exactamente igual que antes: al "eliminar" una venta
 * desaparece de la lista, pero el stock/las mermas no se revierten,
 * porque el cálculo de consumo (_getStockSource) sigue leyendo TODO
 * report_history sin filtrar por deleted_at.
 */
function syncSalesView(){
  sales = reportHistory
    .filter(r => !r.deleted_at)
    .map(r => ({
      id: r.id,
      cocktail_id: r.cocktail_id,
      qty: r.qty,
      week: r.week,
      sale_mode: r.sale_mode,
      created_at: r.created_at,
      registered_by: r.registered_by,
      registered_by_name: r.registered_by_name,
      registered_by_email: r.registered_by_email
    }));
}

/**
 * Carga el historial directamente desde Supabase ordenado de forma cronológica descendente.
 * report_history es la fuente de verdad permanente del consumo de stock Y del
 * registro de ventas. "Eliminar" una venta solo la marca con deleted_at — el
 * cálculo de consumo se basa en report_history completo, deleted_at incluido.
 */
async function loadReportHistory() {
  try {
    const { data, error } = await sb.from('report_history').select('*').order('created_at', { ascending: false }).limit(5000);
    if (!error && data) {
      reportHistory = data;
      console.log('✅ Historial permanente cargado desde Supabase:', data.length, 'registros.');
    } else {
      if (error) console.warn('⚠️ No se pudo leer report_history:', error.message);
      reportHistory = [];
    }
  } catch (e) {
    console.error('❌ Excepción en loadReportHistory:', e);
    reportHistory = [];
  }
}

// Compute how many ml a sale record represents for a given spirit
function getSaleMlForSpirit(s, spiritId){
  const mode=s.sale_mode||'coctel';
  if(mode==='coctel'){
    const r=recipes.find(r=>r.id===s.cocktail_id);
    if(!r) return 0;
    const ing=r.ings.find(i=>i.id===spiritId);
    return ing?(s.qty||1)*ing.ml:0;
  }
  if(mode==='shot'&&s.cocktail_id===spiritId) return (s.qty||1)*60;
  if(mode==='copa'&&s.cocktail_id===spiritId) return (s.qty||1)*150;
  if(mode==='botella'&&s.cocktail_id===spiritId){
    const sp=spirits.find(x=>x.id===spiritId);
    return sp?(s.qty||1)*sp.ml:0;
  }
  return 0;
}

// ═══════════════════════════════════════════════════════════
// COMPARATIVO SEMANAL — "¿cuántas botellas tenía hace ~7 días?"
// Usa los snapshots permanentes que ya guarda report_history en cada
// venta (stock_snapshot). Busca el snapshot más cercano a 7 días atrás
// y lo compara contra el stock combinado (barra+bodega) de hoy.
// ═══════════════════════════════════════════════════════════
function getWeeklyComparison(){
  if(!reportHistory.length) return{refDate:null, rows:[]};
  const now=Date.now();
  const sevenDaysAgo=now-7*24*60*60*1000;
  // Ordenar cronológicamente ascendente para buscar el snapshot más cercano
  const sorted=[...reportHistory].filter(r=>r.created_at && r.stock_snapshot).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  if(!sorted.length) return{refDate:null, rows:[]};
  // Toma el último snapshot ANTES (o igual) de hace 7 días; si no hay ninguno
  // tan antiguo, usa el más antiguo disponible (aún no hay una semana de datos).
  let reference=null;
  for(const r of sorted){
    if(new Date(r.created_at).getTime()<=sevenDaysAgo) reference=r;
    else break;
  }
  if(!reference) reference=sorted[0];

  let snapshotArr=[];
  try{ snapshotArr=JSON.parse(reference.stock_snapshot)||[]; }catch(e){ snapshotArr=[]; }
  const snapMap=Object.fromEntries(snapshotArr.map(e=>[String(e.id),e]));

  const rows=spirits.map(sp=>{
    const entry=snapMap[String(sp.id)];
    let past=null;
    if(entry){
      // remaining_barra es el campo más preciso (botellas/piezas equivalentes).
      // Si el snapshot es viejo y no lo tiene, se aproxima con remaining_ml o stock_barra.
      const pastBarra = entry.remaining_barra!=null ? entry.remaining_barra
        : (entry.remaining_ml!=null ? entry.remaining_ml/(entry.ml||sp.ml||750)
        : (entry.stock_barra!=null ? entry.stock_barra : (entry.stock!=null?entry.stock:0)));
      const pastBodega = entry.stock_bodega!=null ? entry.stock_bodega : 0;
      past = pastBarra+pastBodega;
    }
    const current=getCombinedRemaining(sp);
    return{sp, past, current, delta: past!=null?(current-past):null};
  }).filter(r=>r.past!=null || r.current>0)
    .sort((a,b)=>(a.delta==null?0:a.delta)-(b.delta==null?0:b.delta)); // más consumido (delta más negativo) primero

  return{refDate:reference.created_at, rows};
}

function getRepFilteredSales(){
  if(_repFilterType==='week' && _repFilterWeek)
    return reportHistory.filter(s=>s.week===_repFilterWeek);
  if(_repFilterType==='month' && _repFilterMonth)
    return reportHistory.filter(s=>{
      const d=s.created_at?new Date(s.created_at):null;
      if(!d) return false;
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` === _repFilterMonth;
    });
  if(_repFilterType==='range'){
    // Ambas fechas opcionales: si solo hay "desde" filtra desde ahí, y viceversa
    const from=_repFilterDateFrom?new Date(_repFilterDateFrom+'T00:00:00'):null;
    const to=_repFilterDateTo?new Date(_repFilterDateTo+'T23:59:59'):null;
    if(!from && !to) return reportHistory; // sin fechas = todos
    return reportHistory.filter(s=>{
      if(!s.created_at) return false;
      const d=new Date(s.created_at);
      if(from && d<from) return false;
      if(to   && d>to)   return false;
      return true;
    });
  }
  return reportHistory;
}

  const consumptionRanking=[...spirits]

    .filter(r=>r.total>0)
    .sort((a,b)=>b.total-a.total);
  const maxConsumo=consumptionRanking[0]?.total||1;
  const rankingRows=consumptionRanking.map((r,i)=>{
    const pct=Math.min(100,Math.round((r.total/maxConsumo)*100));

async function addSale(){
  // ── RBAC guard: lector no puede registrar ventas
  if(!currentUser){alert('Sesión no iniciada.');return;}
  if(currentUser.role==='lector'){alert('Tu rol solo tiene permiso de lectura.');return;}

  const week=(document.getElementById('s-wk')?.value||'').trim();
  const coVal=document.getElementById('s-co')?.value||'';
  const qty=parseInt(document.getElementById('s-qty')?.value)||0;

  if(!week){alert('Por favor especifica la semana operativa (ej: Semana 21).');return;}
  if(!coVal||qty<=0){alert('Selecciona un producto y una cantidad válida.');return;}

  // Parse the composite value: "recipe::ID" or "spirit::ID"
  let cocktail_id=null;
  if(coVal.startsWith('recipe::')){cocktail_id=coVal.replace('recipe::','');}
  else if(coVal.startsWith('spirit::')){cocktail_id=coVal.replace('spirit::','');}
  else{cocktail_id=coVal;}

  const sale_mode=_saleMode;

  const btn=document.getElementById('btn-save');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> Confirmando...';}

  // Registro provisional en memoria PRIMERO (igual que el comportamiento anterior):
  // así el snapshot de stock que se guarda ya refleja el consumo de esta venta.
  const provisionalId='tmp-'+Date.now();
  reportHistory.unshift({ id:provisionalId, cocktail_id, qty, week, sale_mode, created_at:new Date().toISOString(), registered_by:currentUser?.id||null });

  // 🛡️ Control de mermas: foto del inventario líquido justo después de esta venta
  const stock_snapshot=JSON.stringify(
    spirits.map(sp=>{
      const barraStock=getEffectiveBarraStock(sp);
      const remainingBarraUnits=Math.max(0, barraStock - (getConsumedML(sp.id) / sp.ml) - getConsumedUnits(sp.id));
      return {
        id: sp.id,
        name: sp.name,
        stock_barra: barraStock,
        stock_bodega: getEffectiveBodegaStock(sp),
        ml: sp.ml,
        remaining_barra: remainingBarraUnits,
        remaining_ml: Math.round(remainingBarraUnits * sp.ml)
      };
    })
  );

  const {data,error}=await sb.from('report_history').insert({cocktail_id,qty,week,sale_mode,registered_by:currentUser?.id||null,stock_snapshot}).select();

  if(error){
    reportHistory=reportHistory.filter(r=>r.id!==provisionalId); // revertir el registro provisional
    alert('Error al guardar en Supabase: '+error.message);
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-plus"></i> Registrar operación';}
    return;
  }
  // Sustituir el provisional por el registro real de Supabase (id/created_at definitivos)
  const idx=reportHistory.findIndex(r=>r.id===provisionalId);
  const finalRecord={
    ...data[0],
    registered_by_name: currentUser?.full_name||'',
    registered_by_email: currentUser?.email||''
  };
  if(idx>=0) reportHistory[idx]=finalRecord; else reportHistory.unshift(finalRecord);

  syncSalesView();
  _weekInput='';
  updatePill();
  render();
}

async function delSale(id){
  // ── RBAC guard: lector no puede eliminar ventas (el resto de roles sí, por correcciones de error)
  if(!currentUser){alert('Sesión no iniciada.');return;}
  if(currentUser.role==='lector'){alert('Tu rol solo tiene permiso de lectura.');return;}
  if(!confirm('Esta venta se eliminará PERMANENTEMENTE de la base de datos y no se podrá recuperar. ¿Deseas continuar?')) return;
  // Borrado real: se elimina la fila de report_history. A partir de ahora
  // el consumo/stock SÍ se recalcula sin esta venta (ya no hay "borrado suave").
  const {data,error}=await sb.from('report_history').delete().eq('id',id).select();
  if(error){alert('Error al eliminar: '+error.message);return;}
  if(!data||data.length===0){
    // 0 filas afectadas sin error explícito = casi siempre un problema de
    // permisos (RLS) en Supabase — avisamos en vez de fallar en silencio.
    alert('No se pudo eliminar la venta: Supabase no encontró o no autorizó el borrado de ese registro (revisa los permisos RLS de DELETE en report_history).');
    return;
  }
  reportHistory=reportHistory.filter(r=>r.id!==id);
  syncSalesView();
  updatePill();
  render();
}

async function adjustStock(id, amount){
  // ── RBAC guard: solo admin y manager ajustan stock
  if(!currentUser){alert('Sesión no iniciada.');return;}
  if(currentUser.role==='bartender'||currentUser.role==='lector'){
    alert('Solo el encargado o administrador puede ajustar el stock.');return;
  }
  const sp=spirits.find(s=>s.id===id);
  if(!sp) return;
  // ── El campo que se ajusta depende de la pestaña activa del catálogo (Barra/Bodega)
  const field=_catLoc==='bodega'?'stock_bodega':'stock_barra';
  const locLabel=_catLoc==='bodega'?'bodega':'barra';
  // Asegurar que amount sea número flotante, nunca NaN ni 0
  const delta=parseFloat(parseFloat(amount).toFixed(2));
  if(isNaN(delta)||delta===0){alert('Cantidad inválida.');return;}
  const current=parseFloat(sp[field])||0;
  const newStock=parseFloat((current+delta).toFixed(2));
  if(newStock<0){alert(`El stock de ${locLabel} no puede ser negativo. Stock actual: `+current.toFixed(2));return;}
  // Feedback visual inmediato
  const btns=document.querySelectorAll(`button[onclick*="adjustStock('${id}'"]`);
  btns.forEach(b=>{b.disabled=true;});
  const {data, error}=await sb.from('spirits').update({[field]:newStock}).eq('id',id).select();
  if(error){
    alert('Error al guardar en Supabase: '+error.message+'\n\nVerifica que las políticas RLS permitan UPDATE a tu rol, y que la columna "'+field+'" exista en la tabla spirits.');
    btns.forEach(b=>{b.disabled=false;});
    return;
  }
  // Actualizar en memoria solo si Supabase confirma
  if(data && data[0]) sp[field]=data[0][field];
  else sp[field]=newStock;

  // ── Registrar fecha de adquisición: solo cuando se AGREGA stock (delta>0)
  // se considera una "alta" de inventario (botella nueva que entró).
  if(delta>0){
    const {data:seData, error:seErr}=await sb.from('stock_entries')
      .insert({spirit_id:id, location:_catLoc, qty:delta, created_by:currentUser?.id||null})
      .select();
    if(seErr){
      console.warn('⚠️ No se pudo registrar la fecha de adquisición:', seErr.message);
    } else if(seData && seData[0]){
      stockEntries.unshift({...seData[0], created_by_name:currentUser?.full_name||'', created_by_email:currentUser?.email||''});
    }
  }
  render();
}

// ═══════════════════════════════════════════════════════════
// TRASPASO MANUAL — Bodega → Barra
// Mueve una cantidad puntual del stock de bodega hacia la barra,
// insertando un registro en la tabla `transfers` (misma fuente
// permanente que ya usa getTransferredIn para calcular el stock
// efectivo). No modifica stock_barra/stock_bodega directamente:
// ambos catálogos se recalculan solos a partir de este registro.
// ═══════════════════════════════════════════════════════════
async function transferToBarra(id, amount){
  // ── RBAC guard: mismo criterio que el ajuste de stock — solo admin y manager
  if(!currentUser){alert('Sesión no iniciada.');return;}
  if(currentUser.role==='bartender'||currentUser.role==='lector'){
    alert('Solo el encargado o administrador puede mover stock entre catálogos.');return;
  }
  const sp=spirits.find(s=>s.id===id);
  if(!sp) return;

  const delta=parseFloat(parseFloat(amount).toFixed(2));
  if(isNaN(delta)||delta<0.01){alert('Cantidad inválida. Debe ser de al menos 0.01 para que valga la pena registrar el traspaso.');return;}

  const available=getEffectiveBodegaStock(sp);
  if(delta>available+1e-9){
    alert(`Solo hay ${available.toFixed(2)} disponible en bodega de "${sp.name}". No puedes mover ${delta.toFixed(2)}.`);
    return;
  }
  if(!confirm(`¿Mover ${delta.toFixed(2)} de "${sp.name}" de bodega a barra?`)) return;

  // Feedback visual inmediato
  const btns=document.querySelectorAll(`button[onclick*="transferToBarra('${id}'"]`);
  const originalHTML=btns.length?btns[0].innerHTML:'';
  btns.forEach(b=>{b.disabled=true;b.innerHTML='<i class="ti ti-loader-2"></i> Moviendo...';});

  const {data, error}=await sb.from('transfers').insert({spirit_id:id, qty:delta, created_by:currentUser?.id||null}).select();

  if(error){
    alert('Error al guardar el traspaso en Supabase: '+error.message+'\n\nVerifica que la tabla "transfers" exista y que las políticas RLS permitan INSERT a tu rol.');
    btns.forEach(b=>{b.disabled=false;b.innerHTML=originalHTML;});
    return;
  }

  if(data && data[0]){
    transfers.unshift({...data[0], created_by_name:currentUser?.full_name||'', created_by_email:currentUser?.email||''});
  } else {
    // Supabase no devolvió la fila creada (típico cuando falta política RLS de SELECT
    // sobre "transfers", aunque el INSERT sí haya funcionado). Se refleja igual en
    // esta sesión, pero conviene revisar las políticas para que persista al recargar.
    console.warn('⚠️ El traspaso se guardó pero Supabase no devolvió la fila — revisa que "transfers" tenga política RLS de SELECT para tu rol, o no se verá al recargar la página.');
    transfers.unshift({id:'tmp-'+Date.now(), spirit_id:id, qty:delta, created_by:currentUser?.id||null, created_at:new Date().toISOString(), created_by_name:currentUser?.full_name||'', created_by_email:currentUser?.email||''});
  }
  render();
}



// ── Arranca la app: revisa sesión existente primero
async function initApp(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    await _loadProfile(session.user);
  } else {
    _showOverlay();
  }
}

// ── Login con email + password
async function login(){
  const email=(document.getElementById('login-email')?.value||'').trim();
  const pass=(document.getElementById('login-pass')?.value||'');
  const btn=document.getElementById('login-btn');
  const errEl=document.getElementById('login-error');
  if(!email||!pass){_showLoginError('Ingresa tu correo y contraseña.');return;}
  btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> Verificando...';
  errEl.classList.remove('show');
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){
    _showLoginError(error.message==='Invalid login credentials'?'Correo o contraseña incorrectos.':error.message);
    btn.disabled=false;btn.innerHTML='<i class="ti ti-lock-open" style="margin-right:6px"></i>Iniciar sesión';
    return;
  }
  await _loadProfile(data.user);
}

// ── Carga el perfil del usuario desde la tabla profiles
async function _loadProfile(user){
  const {data:profile,error}=await sb.from('profiles').select('*').eq('id',user.id).single();

  if(error){
    // PGRST116 = fila no encontrada (usuario nuevo sin perfil) → crear como bartender
    if(error.code==='PGRST116'){
      const {data:created}=await sb.from('profiles')
        .upsert({id:user.id,email:user.email,role:'bartender'},{onConflict:'id'})
        .select().single();
      currentUser={id:user.id,email:user.email,role:(created?.role||'bartender'),full_name:''};
    } else {
      // Error real (RLS, red, etc.) — NO asumir bartender, mostrar error
      console.error('❌ Error al leer profiles:', error.code, error.message);
      _showLoginError('Error al cargar tu perfil ('+error.code+'). Revisa que la tabla profiles tenga RLS correctamente configurado.');
      await sb.auth.signOut();
      const btn=document.getElementById('login-btn');
      if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-lock-open" style="margin-right:6px"></i>Iniciar sesión';}
      return; // ← sale sin cargar la app
    }
  } else {
    // Éxito: usar exactamente el rol que viene de Supabase
    currentUser={id:profile.id,email:profile.email,role:profile.role,full_name:profile.full_name||''};
  }

  console.log('✅ Sesión iniciada como:', currentUser.email, '| Rol:', currentUser.role);
  _hideOverlay();
  _updateUserBadge();
  await loadAll();
}

// ── Logout
async function logout(){
  if(!confirm('¿Cerrar sesión?')) return;
  await sb.auth.signOut();
  currentUser=null;
  _showOverlay();
  _hideUserBadge();
  document.getElementById('main').innerHTML='<div class="loading"><div class="spin"></div><br><br>Cargando inventario...</div>';
  document.getElementById('top-pill').textContent='Conectando...';
}

// ── Helpers overlay
function _showOverlay(){document.getElementById('auth-overlay').classList.remove('hidden');}
function _hideOverlay(){document.getElementById('auth-overlay').classList.add('hidden');}
function _showLoginError(msg){const e=document.getElementById('login-error');e.textContent=msg;e.classList.add('show');}

// ── Actualizar badge de usuario en topbar
function _updateUserBadge(){
  const badge=document.getElementById('user-badge');
  const nameLbl=document.getElementById('user-name-lbl');
  const roleLbl=document.getElementById('user-role-lbl');
  if(!badge||!currentUser) return;
  const roleLabel={admin:'Administrador',manager:'Encargado',bartender:'Bartender',lector:'Lector'}[currentUser.role]||currentUser.role;
  nameLbl.textContent=currentUser.full_name||currentUser.email;
  roleLbl.textContent=roleLabel;
  badge.classList.add('show');
}
function _hideUserBadge(){
  const badge=document.getElementById('user-badge');
  if(badge) badge.classList.remove('show');
}

// ── applyRoleUI: oculta/muestra elementos DOM según el rol
// Se llama automáticamente al final de cada render()
function applyRoleUI(){
  if(!currentUser) return;
  const role=currentUser.role; // 'admin' | 'manager' | 'bartender' | 'lector'

  // ════════════════════════════════════════════
  // NAV BUTTONS
  // idx: 0=dash 1=ventas 2=recetas 3=catalogo 4=reportes
  // ════════════════════════════════════════════
  const navBtns=[...document.querySelectorAll('.nav-btn')];
  const navVisible={
    admin:    [0,1,2,3,4],
    manager:  [0,1,2,3,4],
    bartender:[0,1,2,3],
    lector:   [0,1,2,3,4]   // ve todo excepto acciones — igual que manager en nav
  }[role] || [0,1,2,3,4];

  navBtns.forEach((btn,i)=>{
    btn.style.display=navVisible.includes(i)?'flex':'none';
  });

  // ════════════════════════════════════════════
  // NAV LABELS — ocultar si no hay botones visibles en esa sección
  // ════════════════════════════════════════════
  const navLbls=[...document.querySelectorAll('.nav-lbl')];
  navLbls.forEach(lbl=>{lbl.style.display='';});  // reset
  if(role==='bartender'){
    if(navLbls[2]) navLbls[2].style.display='none'; // oculta label "Análisis"
  }

  // ════════════════════════════════════════════
  // BOTÓN "+ Registrar operación"
  // Lector NO puede registrar ventas
  // ════════════════════════════════════════════
  const btnSave=document.getElementById('btn-save');
  if(btnSave){
    btnSave.style.display=(role==='lector')?'none':'';
  }

  // ════════════════════════════════════════════
  // BOTONES ELIMINAR VENTA (trash)
  // Lector NO puede borrar ventas
  // ════════════════════════════════════════════
  document.querySelectorAll('button[onclick*="delSale"]').forEach(btn=>{
    btn.style.display=(role==='lector')?'none':'';
  });

  // ════════════════════════════════════════════
  // BOTONES AJUSTE STOCK (+/-) en catálogo
  // Bartender y Lector solo pueden VER el catálogo
  // ════════════════════════════════════════════
  document.querySelectorAll('button[onclick*="adjustStock"]').forEach(btn=>{
    btn.style.display=(role==='bartender'||role==='lector')?'none':'';
  });
  // También ocultar el input de cantidad si es lector/bartender
  document.querySelectorAll('input[id^="adj-"]').forEach(inp=>{
    inp.style.display=(role==='bartender'||role==='lector')?'none':'';
  });

  // ════════════════════════════════════════════
  // BOTÓN "Mover a Barra" (traspaso bodega → barra)
  // Mismo criterio que el ajuste de stock: solo admin y manager
  // ════════════════════════════════════════════
  document.querySelectorAll('button[onclick*="transferToBarra"]').forEach(btn=>{
    btn.style.display=(role==='bartender'||role==='lector')?'none':'';
  });
  document.querySelectorAll('input[id^="mv-"]').forEach(inp=>{
    inp.style.display=(role==='bartender'||role==='lector')?'none':'';
  });
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
initApp();
</script>
