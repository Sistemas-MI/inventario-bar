    <meta charset="UTF-8">
    <title>Inventario Bar</title>

    <style>
        :root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f4;
  --color-background-tertiary: #eeece8;
  --color-text-primary: #1c1c1a;
  --color-text-secondary: #6b6b68;
  --color-text-tertiary: #a0a09d;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.2);
  --color-border-primary: rgba(0,0,0,0.3);
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', monospace;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
}
        body {
            background-color: #ffffff;
            font-family: sans-serif;
        }
    </style>
</head>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary)}
.wrap{min-height:600px}
.topbar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;background:#D85A30;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
.logo-name{font-size:15px;font-weight:500;letter-spacing:.02em}
.logo-sub{font-size:11px;color:var(--color-text-secondary)}
.pill{background:#FAECE7;color:#993C1D;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:0.5px solid #F0997B}
.layout{display:grid;grid-template-columns:200px 1fr}
.sidebar{background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);padding:16px 10px}
.nav-lbl{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;padding:0 10px;margin-bottom:6px;margin-top:12px}
.nav-lbl:first-child{margin-top:0}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--color-text-secondary);margin-bottom:2px;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-family:var(--font-sans)}
.nav-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-btn.active{background:#FAECE7;color:#993C1D;font-weight:500}
.nav-btn i{font-size:16px}
.main{padding:22px}
.page-title{font-size:18px;font-weight:500;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:20px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--color-background-secondary);border-radius:8px;padding:12px 14px}
.stat-lbl{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:500;line-height:1}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden;margin-bottom:14px}
.card-head{padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:500}
.card-sub{font-size:11px;color:var(--color-text-secondary)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 14px;font-size:10px;color:var(--color-text-secondary);font-weight:500;text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:9px 14px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.b-ok{background:#EAF3DE;color:#3B6D11}
.b-warn{background:#FAEEDA;color:#854F0B}
.b-crit{background:#FCEBEB;color:#A32D2D}
.btn{padding:7px 13px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-primary);color:var(--color-text-primary);font-size:12px;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:6px;transition:background .1s}
.btn:hover{background:var(--color-background-secondary)}
.btn-coral{background:#D85A30;color:#fff;border-color:#D85A30}
.btn-coral:hover{opacity:.88}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-ghost{border-color:transparent;background:none;color:var(--color-text-secondary)}
.btn-ghost:hover{background:var(--color-background-secondary)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fl{margin-bottom:10px}
.fl label{font-size:11px;color:var(--color-text-secondary);display:block;margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.fl input,.fl select{width:100%;padding:7px 9px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans)}
.prog{height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;margin-top:3px}
.prog-fill{height:100%;border-radius:2px}
.alert-bar{background:#FAECE7;border:0.5px solid #F0997B;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:18px;font-size:13px;color:#993C1D}
.section-p{padding:16px}
.two-col{display:grid;grid-template-columns:240px 1fr;gap:14px;align-items:start}
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.filter-row select{font-size:12px;padding:5px 9px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)}
.tag{display:inline-block;background:#EEEDFE;color:#3C3489;border-radius:6px;padding:2px 7px;font-size:11px;margin:2px}
.empty{text-align:center;padding:28px;color:var(--color-text-tertiary);font-size:13px}
.bottle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.bottle-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:14px 10px 12px;text-align:center}
.bottle-card:hover{border-color:var(--color-border-secondary)}
.b-name{font-size:11px;font-weight:500;margin-top:8px;line-height:1.3}
.b-cat{font-size:10px;color:var(--color-text-tertiary);margin-top:2px}
.b-info{font-size:10px;color:var(--color-text-secondary);margin-top:5px}
</style>

</div>

</div>

    {id:'SIG007',name:'Spicy Roots',cat:'Signature',ings:[{id:'TEQ-MT',ml:30},{id:'MEZ-SOT',ml:30}]},
    {id:'SIG008',name:'Una Horchata',cat:'Signature',ings:[{id:'RON-MA',ml:45}]},
    {id:'SIG009',name:'Five Point Gang',cat:'Signature',ings:[{id:'RON-MG',ml:45},{id:'RON-PA',ml:15}]},
    {id:'SIG010',name:'Seven Sins',cat:'Signature',ings:[{id:'GIN-BX',ml:50}]},
    {id:'SIG011',name:'Phenex',cat:'Signature',ings:[{id:'VOD-BV',ml:50}]},
    {id:'SIG012',name:'Rize Spirits',cat:'Signature',ings:[{id:'JER-TP',ml:45},{id:'VER-CR',ml:20},{id:'VER-CD',ml:15}]},
  ],
  sales:[],
  nextId:1
};

let curTab='dash';

function pct(sp){
  const c=getConsumed(sp.id);
  const totalML=sp.ml*sp.stock;
  return totalML>0?Math.max(0,(totalML-c)/totalML):0;
}
function status(p){
  if(p>=0.5)return{cls:'b-ok',lbl:'OK'};
  if(p>=0.25)return{cls:'b-warn',lbl:'Bajo'};
  return{cls:'b-crit',lbl:'Crítico'};
}
function getConsumed(sid){
  return S.sales.reduce((t,sale)=>{
    const r=S.recipes.find(r=>r.id===sale.cocktailId);
    if(!r)return t;
    const ing=r.ings.find(i=>i.id===sid);
    return t+(ing?sale.qty*ing.ml:0);
  },0);
}

function bottleSVG(p){
  const W=32,H=72;
  const c=p>=0.5?'#639922':p>=0.25?'#BA7517':'#E24B4A';
  const fH=Math.round((H-14)*Math.max(0,Math.min(1,p)));
  const fY=H-4-fH;
  const uid='b'+Math.round(p*100)+'_'+Math.round(Math.random()*9999);
  return`<svg width="${W}" height="${H+12}" viewBox="0 0 ${W} ${H+12}" style="display:block;margin:0 auto">
    <defs><clipPath id="${uid}"><rect x="5" y="12" width="${W-10}" height="${H-12}" rx="3"/></clipPath></defs>
    <rect x="11" y="2" width="${W-22}" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1" opacity=".2"/>
    <rect x="5" y="12" width="${W-10}" height="${H-12}" rx="3" fill="none" stroke="currentColor" stroke-width="1" opacity=".15"/>
    <rect x="5" y="${fY}" width="${W-10}" height="${fH+4}" fill="${c}" opacity=".8" clip-path="url(#${uid})"/>
    <text x="${W/2}" y="${H+11}" text-anchor="middle" font-size="10" fill="currentColor" opacity=".6" font-family="system-ui">${Math.round(p*100)}%</text>
  </svg>`;
}

function go(tab){
  curTab=tab;
  document.querySelectorAll('.nav-btn').forEach((el,i)=>{
    el.classList.toggle('active',['dash','ventas','recetas','catalogo'][i]===tab);
  });
  render();
}

function render(){
  const el=document.getElementById('main');
  const t=document.getElementById('top-pill');
  const total=S.sales.reduce((s,x)=>s+x.qty,0);
  t.textContent=`${total} bebida${total!==1?'s':''} registrada${total!==1?'s':''}`;
  if(curTab==='dash')el.innerHTML=rDash();
  if(curTab==='ventas')el.innerHTML=rVentas();
  if(curTab==='recetas')el.innerHTML=rRecetas();
  if(curTab==='catalogo')el.innerHTML=rCatalogo();
}

function rDash(){
  let ok=0,warn=0,crit=0;
  S.spirits.forEach(sp=>{const p=pct(sp);if(p>=0.5)ok++;else if(p>=0.25)warn++;else crit++;});
  const critList=S.spirits.filter(sp=>pct(sp)<0.25);
  const alertHTML=critList.length?`<div class="alert-bar"><i class="ti ti-alert-triangle" aria-hidden="true" style="font-size:16px"></i><span>${critList.length} licor${critList.length>1?'es':''} en nivel crítico: ${critList.slice(0,4).map(s=>s.name).join(', ')}${critList.length>4?'...':''}</span></div>`:'';
  const cats=[...new Set(S.spirits.map(s=>s.cat))];
  const selOpts=`<option value="all">Todas las categorías</option>`+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  const cards=S.spirits.map(sp=>{
    const p=pct(sp);
    const st=status(p);
    const totalML=sp.ml*sp.stock;
    const consumed=getConsumed(sp.id);
    const remML=Math.max(0,totalML-consumed);
    return`<div class="bottle-card" data-cat="${sp.cat}">
      ${bottleSVG(p)}
      <div class="b-name">${sp.name}</div>
      <div class="b-cat">${sp.cat}</div>
      <span class="badge ${st.cls}" style="margin-top:6px">${st.lbl}</span>
      <div class="b-info">${Math.round(remML).toLocaleString('es-MX')} ml restantes</div>
      <div class="b-info">${(remML/sp.ml).toFixed(1)} bot.</div>
    </div>`;
  }).join('');
  return`
    <div class="page-title">Dashboard</div>
    <div class="page-sub">Estado en tiempo real del inventario</div>
    ${alertHTML}
    <div class="stats-row">
      <div class="stat"><div class="stat-lbl">Licores</div><div class="stat-val">${S.spirits.length}</div></div>
      <div class="stat"><div class="stat-lbl" style="color:#3B6D11">OK</div><div class="stat-val" style="color:#3B6D11">${ok}</div></div>
      <div class="stat"><div class="stat-lbl" style="color:#854F0B">Bajos</div><div class="stat-val" style="color:#854F0B">${warn}</div></div>
      <div class="stat"><div class="stat-lbl" style="color:#A32D2D">Críticos</div><div class="stat-val" style="color:#A32D2D">${crit}</div></div>
    </div>
    <div class="filter-row">
      <label style="font-size:12px;color:var(--color-text-secondary)">Categoría:</label>
      <select onchange="filterBottles(this.value)">${selOpts}</select>
    </div>
    <div class="bottle-grid" id="btl-grid">${cards}</div>`;
}

function filterBottles(cat){
  document.querySelectorAll('.bottle-card').forEach(el=>{
    el.style.display=(cat==='all'||el.dataset.cat===cat)?'block':'none';
  });
}

function rVentas(){
  const rOpts=S.recipes.sort((a,b)=>a.name.localeCompare(b.name)).map(r=>`<option value="${r.id}">${r.name} (${r.cat})</option>`).join('');
  const rows=S.sales.length?S.sales.slice().reverse().map(s=>{
    const r=S.recipes.find(r=>r.id===s.cocktailId);
    const ings=r?r.ings.map(i=>{const sp=S.spirits.find(x=>x.id===i.id);return sp?`${sp.name.split(' ')[0]} ${i.ml}ml`:''}).join(' + '):'';
    return`<tr>
      <td style="font-weight:500">${r?r.name:'?'}</td>
      <td><span class="badge" style="background:#EEEDFE;color:#3C3489">${r?r.cat:'?'}</span></td>
      <td style="text-align:center;font-weight:500">${s.qty}</td>
      <td style="color:var(--color-text-secondary);font-size:12px">${ings}</td>
      <td style="text-align:right"><button class="btn btn-ghost btn-sm" onclick="delSale(${s.id})"><i class="ti ti-trash" style="color:#A32D2D;font-size:14px" aria-hidden="true"></i></button></td>
    </tr>`;
  }).join(''):`<tr><td colspan="5" class="empty">Sin ventas registradas aún</td></tr>`;
  return`
    <div class="page-title">Registrar ventas</div>
    <div class="page-sub">Al registrar una venta, los ml se restan automáticamente del stock</div>
    <div class="two-col">
      <div class="card">
        <div class="card-head"><span class="card-title">Nueva venta</span></div>
        <div class="section-p">
          <div class="fl"><label>Cóctel / Trago</label><select id="s-co" style="width:100%">${rOpts}</select></div>
          <div class="fl"><label>Cantidad vendida</label><input type="number" id="s-qty" min="1" value="1" style="width:100%"></div>
          <button class="btn btn-coral" style="width:100%;justify-content:center;margin-top:4px" onclick="addSale()"><i class="ti ti-plus" aria-hidden="true"></i>Registrar</button>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Historial de ventas</span><span class="card-sub">${S.sales.length} registro${S.sales.length!==1?'s':''}</span></div>
        <table><thead><tr><th>Cóctel</th><th>Tipo</th><th style="text-align:center">Cant.</th><th>Licores usados</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>`;
}

function rRecetas(){
  const cats=[...new Set(S.recipes.map(r=>r.cat))];
  const sections=cats.map(cat=>{
    const list=S.recipes.filter(r=>r.cat===cat);
    const rows=list.map(r=>{
      const totalML=r.ings.reduce((t,i)=>t+i.ml,0);
      const totalSold=S.sales.filter(s=>s.cocktailId===r.id).reduce((t,s)=>t+s.qty,0);
      const ings=r.ings.map(i=>{const sp=S.spirits.find(x=>x.id===i.id);return`<span class="tag">${sp?sp.name:'?'} · ${i.ml}ml</span>`;}).join('');
      return`<tr><td style="font-weight:500">${r.name}</td><td>${ings}</td><td style="text-align:center;color:#D85A30;font-weight:500">${totalML}ml</td><td style="text-align:center">${totalSold}</td></tr>`;
    }).join('');
    return`<div class="card" style="margin-bottom:12px">
      <div class="card-head"><span class="card-title">${cat}</span><span class="card-sub">${list.length} cócteles</span></div>
      <table><thead><tr><th>Cóctel</th><th>Ingredientes alcohólicos</th><th style="text-align:center">ML alcohol</th><th style="text-align:center">Vendidos</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');
  return`<div class="page-title">Recetas</div><div class="page-sub">ML exactos por cóctel según tus fichas técnicas</div>${sections}`;
}

function rCatalogo(){
  const rows=S.spirits.map(sp=>{
    const c=getConsumed(sp.id);
    const totalML=sp.ml*sp.stock;
    const rem=Math.max(0,totalML-c);
    const p=totalML>0?rem/totalML:0;
    const st=status(p);
    const pctDisp=Math.round(p*100);
    const fillColor=p>=0.5?'#97C459':p>=0.25?'#EF9F27':'#E24B4A';
    return`<tr>
      <td style="font-weight:500">${sp.name}</td>
      <td><span style="background:var(--color-background-secondary);border-radius:6px;padding:2px 7px;font-size:11px">${sp.cat}</span></td>
      <td style="text-align:center">${sp.ml}ml</td>
      <td style="text-align:center">
        <input type="number" min="0" step="0.05" value="${sp.stock}" style="width:68px;text-align:center;padding:4px 6px;border:0.5px solid var(--color-border-secondary);border-radius:6px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)" onchange="updStock('${sp.id}',this.value)">
      </td>
      <td style="min-width:100px">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="prog" style="flex:1"><div class="prog-fill" style="width:${pctDisp}%;background:${fillColor}"></div></div>
          <span style="font-size:11px;color:var(--color-text-secondary);min-width:30px">${pctDisp}%</span>
        </div>
      </td>
      <td><span class="badge ${st.cls}">${st.lbl}</span></td>
      <td style="font-size:11px;color:var(--color-text-secondary)">${Math.round(rem).toLocaleString('es-MX')} ml / ${(rem/sp.ml).toFixed(1)} bot.</td>
    </tr>`;
  }).join('');
  return`
    <div class="page-title">Catálogo de licores</div>
    <div class="page-sub">Actualiza el stock al inicio de cada semana. Acepta decimales (0.5 = media botella).</div>
    <div class="card">
      <table><thead><tr><th>Licor</th><th>Categoría</th><th style="text-align:center">ML/botella</th><th style="text-align:center">Stock (botellas)</th><th>Nivel actual</th><th>Estado</th><th>ML restantes</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
}

function addSale(){
  const cocktailId=document.getElementById('s-co').value;
  const qty=parseInt(document.getElementById('s-qty').value)||0;
  if(!cocktailId||qty<=0)return;
  S.sales.push({id:S.nextId++,cocktailId,qty});
  render();
}
function delSale(id){S.sales=S.sales.filter(s=>s.id!==id);render();}
function updStock(id,v){const sp=S.spirits.find(s=>s.id===id);if(sp){sp.stock=Math.max(0,parseFloat(v)||0);render();}}

render();
</script>
