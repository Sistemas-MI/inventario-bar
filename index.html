:root{

  --txt:#1c1c1a;--txt2:#6b6b68;--txt3:#a0a09d;
  --bdr:rgba(0,0,0,0.10);--bdr2:rgba(0,0,0,0.18);
  --accent:#D85A30;--accent-light:#FAECE7;--accent-mid:#F0997B;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg3);color:var(--txt);min-height:100vh}
/* TOPBAR */
.topbar{background:var(--bg);border-bottom:0.5px solid var(--bdr);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0}
.logo-name{font-size:15px;font-weight:500}.logo-sub{font-size:11px;color:var(--txt2)}
.pill{background:var(--accent-light);color:#993C1D;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:0.5px solid var(--accent-mid);white-space:nowrap}
/* LAYOUT */
.layout{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 57px)}
.sidebar{background:var(--bg);border-right:0.5px solid var(--bdr);padding:14px 10px;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
.nav-lbl{font-size:10px;font-weight:500;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;padding:0 10px;margin:12px 0 5px}
.nav-lbl:first-child{margin-top:0}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--txt2);margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:var(--font);transition:all .1s}
.nav-btn:hover{background:var(--bg2);color:var(--txt)}
.nav-btn.active{background:var(--accent-light);color:#993C1D;font-weight:500}
/* MAIN */
.main{padding:22px;overflow-y:auto}
.ph{font-size:18px;font-weight:500;margin-bottom:3px}
.ps{font-size:13px;color:var(--txt2);margin-bottom:20px}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--bg2);border-radius:var(--r);padding:12px 14px}
.stat-lbl{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:500;line-height:1}
/* CARDS */
.card{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:14px}
.card-head{padding:12px 16px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:13px;font-weight:500}.card-sub{font-size:11px;color:var(--txt2)}
/* TABLES */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:10px;color:var(--txt2);font-weight:500;text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid var(--bdr)}
td{padding:8px 12px;border-bottom:0.5px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.ok{background:#EAF3DE;color:#3B6D11}.warn{background:#FAEEDA;color:#854F0B}.crit{background:#FCEBEB;color:#A32D2D}.zero{background:#F7C1C1;color:#791F1F}
.tag{display:inline-block;background:#EEEDFE;color:#3C3489;border-radius:5px;padding:2px 7px;font-size:11px;margin:1px}
/* BUTTONS */
.btn{padding:7px 12px;border:0.5px solid var(--bdr2);border-radius:var(--r);background:var(--bg);color:var(--txt);font-size:12px;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:5px;transition:background .1s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-coral{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-coral:hover{opacity:.88}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-ghost{border-color:transparent;background:none;color:var(--txt2)}.btn-ghost:hover{background:var(--bg2)}
.btn-green{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}.btn-green:hover{background:#C0DD97}
.btn-red{background:#FCEBEB;color:#A32D2D;border-color:#FFBCBC}.btn-red:hover{background:#FFBCBC}
.btn-icon{padding:4px 6px;font-size:14px;line-height:1}
/* FORMS */
.fl{margin-bottom:10px}
.fl label{font-size:11px;color:var(--txt2);display:block;margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.fl input,.fl select,input.inp,select.sel{padding:7px 9px;border:0.5px solid var(--bdr2);border-radius:var(--r);background:var(--bg);color:var(--txt);font-size:13px;font-family:var(--font);width:100%}
.fl input:focus,.fl select:focus,input.inp:focus,select.sel:focus{outline:none;border-color:var(--accent)}
/* MISC */
.alert-bar{background:var(--accent-light);border:0.5px solid var(--accent-mid);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:13px;color:#993C1D}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.two-col{display:grid;grid-template-columns:260px 1fr;gap:14px;align-items:start}
.empty{text-align:center;padding:28px;color:var(--txt3);font-size:13px}
.loading{text-align:center;padding:40px;color:var(--txt2)}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--bdr2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* BOTTLE GRID */
.bottle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.bottle-card{background:var(--bg);border:0.5px solid var(--bdr);border-radius:10px;padding:12px 8px 10px;text-align:center;transition:border-color .15s}
.bottle-card:hover{border-color:var(--bdr2)}
.b-name{font-size:11px;font-weight:500;margin-top:7px;line-height:1.3}
.b-cat{font-size:10px;color:var(--txt3);margin-top:1px}
.b-ml{font-size:10px;color:var(--txt2);margin-top:4px}
.b-stock{font-size:11px;font-weight:500;margin-top:2px}
.prog{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
/* STOCK CONTROLS */
.stock-ctrl{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:6px}
.stock-ctrl button{width:22px;height:22px;border-radius:6px;border:0.5px solid var(--bdr2);background:var(--bg2);cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;font-family:var(--font)}
.stock-ctrl button:hover{background:var(--bdr2)}
.stock-val{font-size:12px;font-weight:500;min-width:28px;text-align:center}
/* ML chip */
.ml-chip{display:inline-block;background:var(--bg2);border-radius:4px;padding:1px 5px;font-size:10px;margin:1px;color:var(--txt2)}
.wk-tag{background:#E8F4FD;color:#1565C0;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:500}
/* WEEKLY TABLE TOGGLE */
.collapse-btn{cursor:pointer;background:none;border:none;font-size:13px;color:var(--txt2);padding:4px 8px;border-radius:var(--r)}
.collapse-btn:hover{background:var(--bg2)}
/* ADMIN */
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.admin-card{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r2);padding:16px}
.admin-card h3{font-size:13px;font-weight:500;margin-bottom:12px;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em}
/* RESPONSIVE */
@media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}.stats-row{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
</style>
</head>

async function loadAll(){
  try{
    const [sp,rc,ri,sl]=await Promise.all([
      sb.from('spirits').select('*').order('cat').order('name'),
      sb.from('recipes').select('*').order('cat').order('name'),
      sb.from('recipe_ingredients').select('*'),
      sb.from('sales').select('*').order('created_at',{ascending:false})
    ]);
    if(sp.error||rc.error||ri.error||sl.error) throw new Error('DB error');
    if(sp.data&&sp.data.length>0) products=sp.data.map(p=>({...p,active:p.active!==false}));
    sales=sl.data||[];
    if(rc.data&&rc.data.length>0){
      recipes=rc.data.map(r=>({
        ...r,
        price: r.price||0,
        ings:(ri.data||[]).filter(i=>i.recipe_id===r.id).map(i=>({id:i.spirit_id,ml:i.ml}))
      }));
    }
  }catch(e){
    console.warn('Supabase not available, running in local mode',e);
    _useLocalMode=true;
  }
  updatePill();
  render();
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function getConsumedML(pid){
  return sales.reduce((t,s)=>{
    if(s.sell_type==='bottle'&&s.product_id===pid){return t+((s.qty||1)*(s.ml_per_unit||1));}
    if(s.sell_type==='shot'&&s.product_id===pid){return t+((s.qty||1)*(s.ml_per_unit||45));}
    if(s.sell_type==='copa'&&s.product_id===pid){return t+((s.qty||1)*(s.ml_per_unit||150));}
    if(s.sell_type==='unit'&&s.product_id===pid){return t+((s.qty||1)*(s.ml_per_unit||330));}
    if(s.sell_type==='cocktail'&&s.cocktail_id){
      const r=recipes.find(r=>r.id===s.cocktail_id);
      if(!r)return t;
      const ing=r.ings.find(i=>i.id===pid);
      return t+(ing?(s.qty||1)*ing.ml:0);
    }
    return t;
  },0);
}
function getWeekConsumed(pid,week){
  return sales.filter(s=>s.week===week).reduce((t,s)=>{
    if((s.sell_type==='bottle'||s.sell_type==='shot'||s.sell_type==='copa'||s.sell_type==='unit')&&s.product_id===pid)
      return t+(s.qty||1)*(s.ml_per_unit||0);
    if(s.sell_type==='cocktail'&&s.cocktail_id){
      const r=recipes.find(r=>r.id===s.cocktail_id);
      if(!r)return t;
      const ing=r.ings.find(i=>i.id===pid);
      return t+(ing?(s.qty||1)*ing.ml:0);
    }
    return t;
  },0);
}
function getRemML(p){return Math.max(0,p.stock*p.ml-getConsumedML(p.id));}
function getRemPct(p){return p.stock===0?0:Math.min(1,getRemML(p)/(p.stock*p.ml));}
function status(pct){
  if(pct<=0)return{cls:'zero',lbl:'Agotado'};
  if(pct>=0.5)return{cls:'ok',lbl:'OK'};
  if(pct>=0.25)return{cls:'warn',lbl:'Bajo'};
  return{cls:'crit',lbl:'Crítico'};
}
function bottleSVG(p){
  const W=32,H=68;
  const c=p<=0?'#F09595':p>=0.5?'#639922':p>=0.25?'#BA7517':'#E24B4A';
  const fH=Math.round((H-14)*Math.max(0,Math.min(1,p))),fY=H-4-fH;
  const uid='bv'+Math.round(p*100)+'x'+Math.round(Math.random()*9999);
  return`<svg width="${W}" height="${H+12}" viewBox="0 0 ${W} ${H+12}" style="display:block;margin:0 auto">
    <defs><clipPath id="${uid}"><rect x="5" y="12" width="${W-10}" height="${H-12}" rx="3"/></clipPath></defs>
    <rect x="11" y="2" width="${W-22}" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1" opacity=".2"/>
    <rect x="5" y="12" width="${W-10}" height="${H-12}" rx="3" fill="none" stroke="currentColor" stroke-width="1" opacity=".15"/>
    <rect x="5" y="${fY}" width="${W-10}" height="${fH+4}" fill="${c}" opacity=".8" clip-path="url(#${uid})"/>
    <text x="${W/2}" y="${H+11}" text-anchor="middle" font-size="10" fill="currentColor" opacity=".6" font-family="system-ui">${Math.round(p*100)}%</text>
  </svg>`;
}
function fmx(n){return(n||0).toLocaleString('es-MX');}
function getWeeks(){return[...new Set(sales.map(s=>s.week))].filter(Boolean).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));}
function updatePill(){
  const t=sales.reduce((s,x)=>s+(x.qty||1),0);
  document.getElementById('top-pill').textContent=`${t} venta${t!==1?'s':''} registrada${t!==1?'s':''}${_useLocalMode?' · Modo local':''}`;
}

}

function rDash(){
  const activeP=products.filter(p=>p.active!==false);
  let ok=0,warn=0,crit=0,zero=0;
  activeP.forEach(p=>{const pct=getRemPct(p);if(pct<=0)zero++;else if(pct>=0.5)ok++;else if(pct>=0.25)warn++;else crit++;});
  const critList=activeP.filter(p=>getRemPct(p)<0.25&&p.stock>0);
  const alertHTML=critList.length?`<div class="alert-bar"><i class="ti ti-alert-triangle" style="font-size:16px"></i><span>${critList.length} producto${critList.length>1?'s':''} en nivel crítico: ${critList.slice(0,4).map(s=>s.name).join(', ')}${critList.length>4?`... y ${critList.length-4} más`:''}</span></div>`:'';
  const weeks=getWeeks();
  const wkOpts=`<option value="all">Todas las semanas</option>`+weeks.map(w=>`<option value="${w}"${_wkFilter===w?' selected':''}>${w}</option>`).join('');
  const cats=[...new Set(activeP.map(p=>p.cat))].sort();
  const catOpts=`<option value="all">Todas las categorías</option>`+cats.map(c=>`<option value="${c}"${_catFilter===c?' selected':''}>${c}</option>`).join('');

  // Weekly metrics table
  const visibleP=_catFilter==='all'?activeP:activeP.filter(p=>p.cat===_catFilter);
  const weekTableRows=visibleP.filter(p=>p.stock>0).map(p=>{
    const totalML=p.stock*p.ml;
    const consumed=_wkFilter==='all'?getConsumedML(p.id):getWeekConsumed(p.id,_wkFilter);
    const rem=Math.max(0,totalML-consumed);
    const pct=totalML>0?rem/totalML:0;
    const st=status(pct);
    const fc=pct<=0?'#F09595':pct>=0.5?'#97C459':pct>=0.25?'#EF9F27':'#E24B4A';
    return`<tr>
      <td style="font-weight:500">${p.name}</td>
      <td><span style="background:var(--bg2);border-radius:5px;padding:2px 6px;font-size:10px">${p.cat}</span></td>
      <td style="text-align:center">${p.ml}ml</td>

function updateSellTypes(){
  const sel=document.getElementById('v-prod');
  if(!sel)return;
  const opt=sel.options[sel.selectedIndex];
  const type=opt?opt.getAttribute('data-type'):'licor';
  const st=document.getElementById('v-stype');
  if(!st)return;
  const opts=type==='cerveza'||type==='agua'?
    `<option value="unit">Unidad</option>`:
    type==='vino'?
    `<option value="copa">Copa (≈150ml)</option><option value="bottle">Botella completa</option>`:
    `<option value="shot">Shot (≈45ml)</option><option value="bottle">Botella completa</option>`;
  st.innerHTML=opts;
}

    return`<div class="card" style="margin-bottom:12px">
      <div class="card-head">

    ${sections}
  `;
}

// ═══════════════════════════════════════════
// RECETAS
// ═══════════════════════════════════════════
function rRecetas(){
  const withPop=recipes.map(r=>({
    ...r,
    sold:sales.filter(s=>s.cocktail_id===r.id).reduce((t,s)=>t+(s.qty||1),0),
    revenue:sales.filter(s=>s.cocktail_id===r.id).reduce((t,s)=>t+(s.price||r.price||0)*(s.qty||1),0)
  }));
  const sorted=[...withPop].sort((a,b)=>b.sold-a.sold);
  const maxSold=sorted[0]?.sold||1;
  const top3=sorted.filter(r=>r.sold>0).slice(0,3);
  const bottom3=[...sorted].filter(r=>r.sold===0||r.sold>0).slice(-3).reverse();
  const medals=['🥇','🥈','🥉'],podColors=['#FFF3CD','#F0F0F0','#FFF0E8'];

  const top3HTML=top3.length?`<div class="card" style="margin-bottom:12px">
    <div class="card-head"><span class="card-title">⭐ Más populares</span></div>
    <div style="display:grid;grid-template-columns:repeat(${top3.length},1fr);gap:10px;padding:12px">
      ${top3.map((r,i)=>`<div style="text-align:center;background:${podColors[i]};border-radius:8px;padding:10px">
        <div style="font-size:20px">${medals[i]}</div>
        <div style="font-size:12px;font-weight:500;margin-top:4px">${r.name}</div>
        <div style="font-size:11px;color:var(--txt2)">${r.sold} vendidos</div>
        ${r.revenue>0?`<div style="font-size:11px;color:#3B6D11;font-weight:500">$${fmx(r.revenue)}</div>`:''}
      </div>`).join('')}
    </div>
  </div>`:'';

  const least=sorted.filter(r=>r.sold===0);
  const leastHTML=least.length?`<div class="card" style="margin-bottom:12px">
    <div class="card-head"><span class="card-title">⚠️ Menos vendidos / Sin movimiento</span><span class="card-sub">${least.length} cócteles</span></div>
    <div style="padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px">
      ${least.map(r=>`<span class="badge" style="background:#FFF8E1;color:#856404">${r.name}</span>`).join('')}
    </div>
  </div>`:'';

  const cats=[...new Set(recipes.map(r=>r.cat))];
  const sections=cats.map(cat=>{
    const list=sorted.filter(r=>r.cat===cat);
    const rows=list.map(r=>{
      const totalML=r.ings.reduce((t,i)=>t+i.ml,0);
      const mainIng=r.ings.length?r.ings.reduce((a,b)=>a.ml>=b.ml?a:b,r.ings[0]):null;
      const mainSp=mainIng?products.find(p=>p.id===mainIng.id):null;
      const rend=mainSp&&mainIng?`${Math.floor(mainSp.ml/mainIng.ml)} tragos/bot`:'—';
      const grank=sorted.findIndex(x=>x.id===r.id);
      let rankEl=grank===0&&r.sold>0?`<span style="background:#FFF3CD;color:#856404;border-radius:5px;padding:2px 5px;font-size:10px;font-weight:600">🥇#1</span>`:
                 grank===1&&r.sold>0?`<span style="background:#F0F0F0;color:#6C757D;border-radius:5px;padding:2px 5px;font-size:10px;font-weight:600">🥈#2</span>`:
                 grank===2&&r.sold>0?`<span style="background:#FFF0E8;color:#A0522D;border-radius:5px;padding:2px 5px;font-size:10px;font-weight:600">🥉#3</span>`:'';
      const ings=r.ings.map(i=>{const p=products.find(x=>x.id===i.id);return`<span class="tag">${p?p.name:'?'} ${i.ml}ml</span>`;}).join('');
      const popPct=maxSold>0?Math.round((r.sold/maxSold)*100):0;
      return`<tr>
        <td style="width:50px">${rankEl}</td>
        <td style="font-weight:500">${r.name}</td>
        <td>${ings||'—'}</td>
        <td style="text-align:center;color:var(--accent);font-weight:500">${totalML}ml</td>
        <td style="text-align:center;font-size:11px;color:var(--txt2)">${rend}</td>
        <td style="text-align:center;font-weight:500">${r.price>0?`$${r.price}`:''}</td>
        <td style="text-align:center">
          <span style="font-weight:500">${r.sold}</span>
          ${r.sold>0?`<div class="prog" style="margin-top:3px"><div class="prog-fill" style="width:${popPct}%;background:var(--accent)"></div></div>`:''}
        </td>
        <td style="text-align:right;color:#3B6D11;font-weight:500">${r.revenue>0?`$${fmx(r.revenue)}`:''}</td>
      </tr>`;
    }).join('');
    return`<div class="card" style="margin-bottom:12px">
      <div class="card-head"><span class="card-title">${cat}</span><span class="card-sub">${list.length} cócteles</span></div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th style="width:50px">Rank</th><th>Cóctel</th><th>Ingredientes</th><th style="text-align:center">ML</th><th style="text-align:center">Rend.</th><th style="text-align:center">Precio</th><th style="text-align:center">Vendidos</th><th style="text-align:right">Ingresos</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join('');

  return`
    <div class="ph">Recetas y Mixología</div>
    <div class="ps">Popularidad, rendimiento por botella e ingresos estimados</div>
    ${top3HTML}${leastHTML}${sections}
  `;
}

              </select>
            </div>
            <div class="fl"><label>Precio de venta ($)</label><input class="inp" type="number" id="rc-price" value="0" min="0"></div>
          </div>
          <div class="fl"><label>Ingredientes (producto · ML, separados por coma)</label>
            <input class="inp" type="text" id="rc-ings" placeholder="Ej: GIN007·45, VER003·30, AP003·25">
          </div>
          <button class="btn btn-coral" style="width:100%;justify-content:center" onclick="addRecipe()"><i class="ti ti-plus"></i> Agregar receta</button>
        </div>
      </div>
    </div>

    <!-- TABLA DE GESTIÓN -->
    <div class="card">
      <div class="card-head"><span class="card-title">📋 Productos activos — Gestión de precios</span><span class="card-sub">${activeP.length} productos</span></div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Nombre</th><th>Categoría</th><th style="text-align:center">ML/bot</th><th style="text-align:center">Precio shot/copa</th><th style="text-align:center">Precio botella</th><th>Acción</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
async function addSaleCocktail(){
  const week=(document.getElementById('v-wk')?.value||'').trim();
  const cocktail_id=document.getElementById('v-co')?.value;
  const qty=parseInt(document.getElementById('v-cqty')?.value)||0;
  if(!week){alert('Ingresa la semana');return;}
  if(!cocktail_id||qty<=0)return;
  const r=recipes.find(x=>x.id===cocktail_id);
  const rec={id:String(Date.now()),cocktail_id,product_id:null,qty,week,sell_type:'cocktail',ml_per_unit:0,price:r?.price||0,created_at:new Date().toISOString()};
  if(!_useLocalMode){
    const {data,error}=await sb.from('sales').insert({cocktail_id,product_id:null,qty,week,sell_type:'cocktail',ml_per_unit:0,price:r?.price||0}).select();
    if(error){alert('Error: '+error.message);return;}
    sales.unshift(data[0]);
  }else{sales.unshift({...rec,id:_nextLocalId++});}
  updatePill();render();
}

async function addSaleProduct(){
  const week=(document.getElementById('v-wk2')?.value||'').trim();
  const product_id=document.getElementById('v-prod')?.value;
  const sell_type=document.getElementById('v-stype')?.value||'shot';
  const qty=parseInt(document.getElementById('v-pqty')?.value)||0;
  if(!week){alert('Ingresa la semana');return;}
  if(!product_id||qty<=0)return;
  const p=products.find(x=>x.id===product_id);
  const ml_per_unit=sell_type==='bottle'?(p?.ml||750):sell_type==='copa'?150:sell_type==='unit'?(p?.ml||330):45;
  const price=sell_type==='bottle'?(p?.price_bottle||0):(p?.price_shot||0);
  const rec={id:String(Date.now()),cocktail_id:null,product_id,qty,week,sell_type,ml_per_unit,price};
  if(!_useLocalMode){
    const {data,error}=await sb.from('sales').insert({cocktail_id:null,product_id,qty,week,sell_type,ml_per_unit,price}).select();
    if(error){alert('Error: '+error.message);return;}
    sales.unshift(data[0]);
  }else{sales.unshift({...rec,id:_nextLocalId++});}
  updatePill();render();
}

async function delSale(id){
  if(!confirm('¿Eliminar esta venta?'))return;
  if(!_useLocalMode){
    const {error}=await sb.from('sales').delete().eq('id',id);
    if(error){alert('Error: '+error.message);return;}
  }
  sales=sales.filter(s=>s.id!==id);
  updatePill();render();
}

async function adjustStock(id,delta){
  const p=products.find(x=>x.id===id);
  if(!p)return;
  const newStock=Math.max(0,parseFloat((p.stock+(delta)).toFixed(2)));
  if(!_useLocalMode){
    const {error}=await sb.from('spirits').update({stock:newStock}).eq('id',id);
    if(error){alert('Error: '+error.message);return;}
  }
  p.stock=newStock;render();
}

function addProduct(){
  const name=(document.getElementById('a-name')?.value||'').trim();
  const cat=document.getElementById('a-cat')?.value||'';
  const type=document.getElementById('a-type')?.value||'licor';
  const ml=parseInt(document.getElementById('a-ml')?.value)||750;
  const price_shot=parseInt(document.getElementById('a-pshot')?.value)||0;
  const price_bottle=parseInt(document.getElementById('a-pbot')?.value)||0;
  if(!name){alert('Ingresa el nombre del producto');return;}
  const id='P'+Date.now();
  const prod={id,name,cat,type,ml,stock:0,price_shot,price_bottle,active:true};
  products.push(prod);
  if(!_useLocalMode){sb.from('spirits').insert({id,name,cat,ml,stock:0,price_shot,price_bottle,active:true});}
  render();
}

function addRecipe(){
  const name=(document.getElementById('rc-name')?.value||'').trim();
  const cat=document.getElementById('rc-cat')?.value||'Clásico';
  const price=parseInt(document.getElementById('rc-price')?.value)||0;
  const ingsRaw=(document.getElementById('rc-ings')?.value||'').trim();
  if(!name){alert('Ingresa el nombre del cóctel');return;}
  const ings=ingsRaw?ingsRaw.split(',').map(s=>{const[id,ml]=s.trim().split('·');return{id:(id||'').trim(),ml:parseInt(ml)||0};}).filter(i=>i.id):{};
  const id='R'+Date.now();
  recipes.push({id,name,cat,price,ings:Array.isArray(ings)?ings:[],sold:0,revenue:0});
  render();
}

function updatePrice(id,field,val){
  const p=products.find(x=>x.id===id);
  if(!p)return;
  const v=parseInt(val)||0;
  if(field==='shot')p.price_shot=v;
  else p.price_bottle=v;
  if(!_useLocalMode){
    const upd={};
    upd[field==='shot'?'price_shot':'price_bottle']=v;
    sb.from('spirits').update(upd).eq('id',id);
  }
}

function deactivateProduct(id){
  if(!confirm('¿Dar de baja este producto? Podrás reactivarlo desde la base de datos.'))return;
  const p=products.find(x=>x.id===id);
  if(p){p.active=false;}
  if(!_useLocalMode){sb.from('spirits').update({active:false}).eq('id',id);}
  render();
}

loadAll();
