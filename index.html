<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Bar</title>

    <style>
        :root {
            --color-background-primary: #ffffff;
            --color-background-secondary: #f5f5f4;
            --color-background-tertiary: #eeece8;
            --color-text-primary: #1c1c1a;
            --color-text-secondary: #6b6b68;
            --color-text-tertiary: #a0a09d;
            --color-border-tertiary: rgba(0,0,0,0.12);
            --color-border-secondary: rgba(0,0,0,0.2);
            --color-border-primary: rgba(0,0,0,0.3);
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', monospace;
            --border-radius-md: 8px;
            --border-radius-lg: 12px;
            --border-radius-xl: 16px;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary)}
        .topbar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
        .logo-icon{width:30px;height:30px;background:#D85A30;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
        .logo-name{font-size:15px;font-weight:500}.logo-sub{font-size:11px;color:var(--color-text-secondary)}
        .pill{background:#FAECE7;color:#993C1D;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:0.5px solid #F0997B}
        .layout{display:grid;grid-template-columns:200px 1fr}
        .sidebar{background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);padding:16px 10px;min-height:calc(100vh - 55px)}
        .nav-lbl{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;padding:0 10px;margin-bottom:6px;margin-top:12px}
        .nav-lbl:first-child{margin-top:0}
        .nav-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--color-text-secondary);margin-bottom:2px;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-family:var(--font-sans)}
        .nav-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
        .nav-btn.active{background:#FAECE7;color:#993C1D;font-weight:500}
        .main{padding:22px}
        .page-title{font-size:18px;font-weight:500;margin-bottom:4px}
        .page-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:20px}
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
        .stat{background:var(--color-background-secondary);border-radius:8px;padding:12px 14px}
        .stat-lbl{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
        .stat-val{font-size:24px;font-weight:500;line-height:1}
        .card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden;margin-bottom:14px}
        .card-head{padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between}
        .card-title{font-size:13px;font-weight:500}.card-sub{font-size:11px;color:var(--color-text-secondary)}
        table{width:100%;border-collapse:collapse;font-size:13px}
        th{text-align:left;padding:9px 14px;font-size:10px;color:var(--color-text-secondary);font-weight:500;text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid var(--color-border-tertiary)}
        td{padding:9px 14px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:var(--color-background-secondary)}
        .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
        .b-ok{background:#EAF3DE;color:#3B6D11}.b-warn{background:#FAEEDA;color:#854F0B}.b-crit{background:#FCEBEB;color:#A32D2D}.b-zero{background:#F7C1C1;color:#791F1F}
        .btn{padding:7px 13px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-primary);color:var(--color-text-primary);font-size:12px;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:6px}
        .btn:hover{background:var(--color-background-secondary)}
        .btn-coral{background:#D85A30;color:#fff;border-color:#D85A30}.btn-coral:hover{opacity:.88}
        .btn-sm{padding:4px 9px;font-size:11px}
        .btn-ghost{border-color:transparent;background:none;color:var(--color-text-secondary)}.btn-ghost:hover{background:var(--color-background-secondary)}
        .btn-add{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}.btn-add:hover{background:#C0DD97}
        .fl{margin-bottom:10px}
        .fl label{font-size:11px;color:var(--color-text-secondary);display:block;margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
        .fl input,.fl select,.sel{padding:7px 9px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans)}
        .alert-bar{background:#FAECE7;border:0.5px solid #F0997B;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:18px;font-size:13px;color:#993C1D}
        .section-p{padding:16px}
        .two-col{display:grid;grid-template-columns:240px 1fr;gap:14px;align-items:start}
        .tag{display:inline-block;background:#EEEDFE;color:#3C3489;border-radius:6px;padding:2px 7px;font-size:11px;margin:2px}
        .empty{text-align:center;padding:28px;color:var(--color-text-tertiary);font-size:13px}
        .bottle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px}
        .bottle-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:14px 10px 12px;text-align:center}
        .b-name{font-size:11px;font-weight:500;margin-top:8px;line-height:1.3}.b-cat{font-size:10px;color:var(--color-text-tertiary);margin-top:2px}.b-info{font-size:10px;color:var(--color-text-secondary);margin-top:4px}
        .wk-tag{background:#E8F4FD;color:#1565C0;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:500}
        .ml-chip{display:inline-block;background:var(--color-background-secondary);border-radius:4px;padding:1px 6px;font-size:10px;margin:1px;color:var(--color-text-secondary)}
        .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
        .add-input{width:55px;text-align:center;padding:4px 6px;border:0.5px solid var(--color-border-secondary);border-radius:6px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)}
    </style>
</head>

<div style="min-height:600px">

        <div class="main" id="main"></div>
    </div>
</div>

let curTab='dash';
window._wkFilter='all';
window._cFilter='all';

function getConsumedML(sid){
  return S.sales.reduce((t,s)=>{
    const r=S.recipes.find(r=>r.id===s.cocktailId);
    if(!r)return t;
    const ing=r.ings.find(i=>i.id===sid);
    return t+(ing?s.qty*ing.ml:0);
  },0);
}
function getRemainingBottles(sp){
  return Math.max(0,sp.stock-getConsumedML(sp.id)/sp.ml);
}
function getRemainingPct(sp){
  return sp.stock===0?0:Math.min(1,getRemainingBottles(sp)/sp.stock);
}
function status(p){
  if(p<=0)return{cls:'b-zero',lbl:'Agotado'};
  if(p>=0.5)return{cls:'b-ok',lbl:'OK'};
  if(p>=0.25)return{cls:'b-warn',lbl:'Bajo'};
  return{cls:'b-crit',lbl:'Crítico'};
}
function bottleSVG(p){
  const W=32,H=72,c=p<=0?'#F09595':p>=0.5?'#639922':p>=0.25?'#BA7517':'#E24B4A';
  const fH=Math.round((H-14)*Math.max(0,Math.min(1,p))),fY=H-4-fH;
  const uid='b'+Math.round(p*1000)+'_'+Math.round(Math.random()*9999);
  return`<svg width="${W}" height="${H+12}" viewBox="0 0 ${W} ${H+12}" style="display:block;margin:0 auto">
    <defs><clipPath id="${uid}"><rect x="5" y="12" width="${W-10}" height="${H-12}" rx="3"/></clipPath></defs>
    <rect x="11" y="2" width="${W-22}" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1" opacity=".2"/>
    <rect x="5" y="12" width="${W-10}" height="${H-12}" rx="3" fill="none" stroke="currentColor" stroke-width="1" opacity=".15"/>
    <rect x="5" y="${fY}" width="${W-10}" height="${fH+4}" fill="${c}" opacity=".8" clip-path="url(#${uid})"/>
    <text x="${W/2}" y="${H+11}" text-anchor="middle" font-size="10" fill="currentColor" opacity=".6" font-family="system-ui">${Math.round(p*100)}%</text>
  </svg>`;
}

function go(tab){
  curTab=tab;
  document.querySelectorAll('.nav-btn').forEach((el,i)=>{
    el.classList.toggle('active',['dash','ventas','recetas','catalogo'][i]===tab);
  });
  render();
}

function render(){
  const total=S.sales.reduce((s,x)=>s+x.qty,0);
  document.getElementById('top-pill').textContent=`${total} bebida${total!==1?'s':''} registrada${total!==1?'s':''}`;
  const el=document.getElementById('main');
  if(curTab==='dash')el.innerHTML=rDash();
  if(curTab==='ventas')el.innerHTML=rVentas();
  if(curTab==='recetas')el.innerHTML=rRecetas();
  if(curTab==='catalogo')el.innerHTML=rCatalogo();
}

/* ─── DASHBOARD ─── */
function rDash(){
  let ok=0,warn=0,crit=0,zero=0;
  S.spirits.forEach(sp=>{const p=getRemainingPct(sp);if(p<=0)zero++;else if(p>=0.5)ok++;else if(p>=0.25)warn++;else crit++;});
  const critList=S.spirits.filter(sp=>getRemainingPct(sp)<0.25);
  const alertHTML=critList.length?`<div class="alert-bar"><i class="ti ti-alert-triangle" aria-hidden="true" style="font-size:16px"></i><span>${critList.length} licor${critList.length>1?'es':''} en nivel crítico: ${critList.slice(0,4).map(s=>s.name).join(', ')}${critList.length>4?'...':''}</span></div>`:'';
  const cats=[...new Set(S.spirits.map(s=>s.cat))];
  const selOpts=`<option value="all">Todas las categorías</option>`+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  const cards=S.spirits.map(sp=>{
    const p=getRemainingPct(sp),remBot=getRemainingBottles(sp),remML=remBot*sp.ml,st=status(p);
    return`<div class="bottle-card" data-cat="${sp.cat}">
      ${bottleSVG(p)}
      <div class="b-name">${sp.name}</div><div class="b-cat">${sp.cat}</div>
      <span class="badge ${st.cls}" style="margin-top:6px">${st.lbl}</span>
      <div class="b-info">${Math.round(remML).toLocaleString('es-MX')} ml</div>
      <div class="b-info" style="font-weight:500">${remBot.toFixed(2)} botellas</div>
    </div>`;
  }).join('');
  return`
    <div class="page-title">Dashboard</div>
    <div class="page-sub">Stock en tiempo real — actualizado por cada venta registrada</div>
    ${alertHTML}
    <div class="stats-row">
      <div class="stat"><div class="stat-lbl">Total licores</div><div class="stat-val">${S.spirits.length}</div></div>
      <div class="stat"><div class="stat-lbl" style="color:#3B6D11">OK</div><div class="stat-val" style="color:#3B6D11">${ok}</div></div>
      <div class="stat"><div class="stat-lbl" style="color:#854F0B">Bajos</div><div class="stat-val" style="color:#854F0B">${warn+crit}</div></div>
      <div class="stat"><div class="stat-lbl" style="color:#A32D2D">Agotados</div><div class="stat-val" style="color:#A32D2D">${zero}</div></div>
    </div>
    <div class="toolbar">
      <label style="font-size:12px;color:var(--color-text-secondary)">Categoría:</label>
      <select class="sel" onchange="filterBottles(this.value)" style="font-size:12px;padding:5px 9px">${selOpts}</select>
    </div>
    <div class="bottle-grid" id="btl-grid">${cards}</div>`;
}
function filterBottles(cat){
  document.querySelectorAll('.bottle-card').forEach(el=>{el.style.display=(cat==='all'||el.dataset.cat===cat)?'':'none';});
}

/* ─── VENTAS ─── */
function rVentas(){
  const weeks=[...new Set(S.sales.map(s=>s.week))].filter(Boolean).sort();
  const wkOpts=`<option value="all">Todas las semanas</option>`+weeks.map(w=>`<option value="${w}"${window._wkFilter===w?' selected':''}>${w}</option>`).join('');
  const rOpts=[...S.recipes].sort((a,b)=>a.name.localeCompare(b.name)).map(r=>`<option value="${r.id}">${r.name} · ${r.cat}</option>`).join('');
  const filtered=window._wkFilter==='all'?S.sales:S.sales.filter(s=>s.week===window._wkFilter);

  const rows=filtered.length?[...filtered].reverse().map(s=>{
    const r=S.recipes.find(x=>x.id===s.cocktailId);
    const mlDetail=r?r.ings.map(i=>{
      const sp=S.spirits.find(x=>x.id===i.id);
      const total=i.ml*s.qty;
      return sp?`<span class="ml-chip"><b>${sp.name.split(' ')[0]}</b> −${total}ml</span>`:'';
    }).join(''):'—';
    return`<tr>
      <td style="font-weight:500">${r?r.name:'?'}</td>
      <td><span class="badge" style="background:#EEEDFE;color:#3C3489">${r?r.cat:'?'}</span></td>
      <td style="text-align:center;font-weight:500">${s.qty}</td>
      <td><span class="wk-tag">${s.week||'—'}</span></td>
      <td style="max-width:220px">${mlDetail}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="delSale(${s.id})"><i class="ti ti-trash" style="color:#A32D2D;font-size:14px" aria-hidden="true"></i></button></td>
    </tr>`;
  }).join(''):`<tr><td colspan="6" class="empty">Sin ventas en este período</td></tr>`;

  return`
    <div class="page-title">Registrar ventas</div>
    <div class="page-sub">Ingresa la semana al registrar — el sistema descuenta los ML exactos de cada botella</div>
    <div class="two-col">
      <div class="card">
        <div class="card-head"><span class="card-title">Nueva venta</span></div>
        <div class="section-p">
          <div class="fl"><label>Semana *</label><input type="text" id="s-wk" placeholder="Ej: Semana 21" style="width:100%"></div>
          <div class="fl"><label>Cóctel / Trago</label><select id="s-co" style="width:100%">${rOpts}</select></div>
          <div class="fl"><label>Cantidad vendida</label><input type="number" id="s-qty" min="1" value="1" style="width:100%"></div>
          <button class="btn btn-coral" style="width:100%;justify-content:center" onclick="addSale()"><i class="ti ti-plus" aria-hidden="true"></i> Registrar venta</button>
        </div>
      </div>
      <div>
        <div class="toolbar">
          <label style="font-size:12px;color:var(--color-text-secondary)">Filtrar semana:</label>
          <select class="sel" onchange="window._wkFilter=this.value;render()" style="font-size:12px;padding:5px 9px">${wkOpts}</select>
          <span style="font-size:12px;color:var(--color-text-secondary);margin-left:4px">${filtered.length} registro${filtered.length!==1?'s':''}</span>
        </div>
        <div class="card">
          <table>
            <thead><tr><th>Cóctel</th><th>Tipo</th><th style="text-align:center">Cant.</th><th>Semana</th><th>ML descontados por botella</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
}

function addSale(){
  const week = document.getElementById('s-wk').value.trim();
  const cocktailId = document.getElementById('s-co').value;
  const qty = parseInt(document.getElementById('s-qty').value) || 1;
  if(!week){ alert('Por favor, ingresa una semana (ej. Semana 21)'); return; }
  S.sales.push({ id: S.nextId++, week, cocktailId, qty });
  render();
}

function delSale(id){
  S.sales = S.sales.filter(s => s.id !== id);
  render();
}

/* ─── RECETAS ─── */
function rRecetas(){
  const withPop=S.recipes.map(r=>({...r,sold:S.sales.filter(s=>s.cocktailId===r.id).reduce((t,s)=>t+s.qty,0)}));
  const ranked=[...withPop].sort((a,b)=>b.sold-a.sold);
  const maxSold=ranked[0]?.sold||1;
  const top3=ranked.filter(r=>r.sold>0).slice(0,3);
  const medals=['🥇','🥈','🥉'];
  const podColors=['#FFF3CD','#F0F0F0','#FFF0E8'];

  const top3HTML=top3.length?`
    <div class="card" style="margin-bottom:14px">
      <div class="card-head"><span class="card-title">⭐ Cócteles más populares</span><span class="card-sub">Basado en ventas registradas</span></div>
      <div style="display:grid;grid-template-columns:repeat(${top3.length},1fr);gap:10px;padding:14px">
        ${top3.map((r,i)=>`<div style="text-align:center;background:${podColors[i]};border-radius:8px;padding:12px">
          <div style="font-size:22px">${medals[i]}</div>
          <div style="font-size:12px;font-weight:500;margin-top:4px;line-height:1.3">${r.name}</div>
          <div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">${r.sold} vendidos</div>
        </div>`).join('')}
      </div>
    </div>` : '';

  const cats=[...new Set(S.recipes.map(r=>r.cat))];
  const sections=cats.map(cat=>{
    const list=ranked.filter(r=>r.cat===cat);
    const rows=list.map(r=>{
      const totalML=r.ings.reduce((t,i)=>t+i.ml,0);
      const mainIng=r.ings.reduce((a,b)=>a.ml>=b.ml?a:b,r.ings[0]);
      const mainSp=S.spirits.find(x=>x.id===mainIng.id);
      const rend=mainSp?`${Math.floor(mainSp.ml/mainIng.ml)} tragos/bot.`:'—';
      const globalRank=ranked.findIndex(x=>x.id===r.id);
      let rankEl='';
      if(globalRank===0&&r.sold>0)rankEl=`<span style="background:#FFF3CD;color:#856404;border-radius:5px;padding:2px 6px;font-size:11px;font-weight:600">🥇 #1</span>`;
      else if(globalRank===1&&r.sold>0)rankEl=`<span style="background:#F0F0F0;color:#6C757D;border-radius:5px;padding:2px 6px;font-size:11px;font-weight:600">🥈 #2</span>`;
      else if(globalRank===2&&r.sold>0)rankEl=`<span style="background:#FFF0E8;color:#A0522D;border-radius:5px;padding:2px 6px;font-size:11px;font-weight:600">🥉 #3</span>`;
      const ings=r.ings.map(i=>{const sp=S.spirits.find(x=>x.id===i.id);return`<span class="tag">${sp?sp.name:'?'} ${i.ml}ml</span>`;}).join('');
      const popPct=maxSold>0?Math.round((r.sold/maxSold)*100):0;
      return`<tr>
        <td style="width:65px">${rankEl}</td>
        <td style="font-weight:500">${r.name}</td>
        <td>${ings}</td>
        <td style="text-align:center;color:#D85A30;font-weight:500">${totalML}ml</td>
        <td style="text-align:center;font-size:11px;color:var(--color-text-secondary)">${rend}</td>
        <td style="text-align:center">
          <span style="font-weight:500">${r.sold}</span>
          ${r.sold>0?`<div style="height:3px;background:var(--color-background-secondary);border-radius:2px;margin-top:4px;overflow:hidden"><div style="height:100%;width:${popPct}%;background:#D85A30;border-radius:2px"></div></div>`:''}
        </td>
      </tr>`;
    }).join('');
    return`<div class="card" style="margin-bottom:12px">
      <div class="card-head"><span class="card-title">${cat}</span><span class="card-sub">${list.length} cócteles</span></div>
      <table><thead><tr><th style="width:65px">Rank</th><th>Cóctel</th><th>Ingredientes</th><th style="text-align:center">ML</th><th style="text-align:center">Rendimiento</th><th style="text-align:center">Vendidos</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');

  return`
    <div class="page-title">Recetas</div>
    <div class="page-sub">Ordenadas por popularidad · Rendimiento = tragos por botella del licor principal</div>
    ${top3HTML}${sections}`;
}

/* ─── CATÁLOGO ─── */
function rCatalogo(){
  const cats=[...new Set(S.spirits.map(s=>s.cat))].sort();
  const catOpts=`<option value="all">Todas</option>`+cats.map(c=>`<option value="${c}"${window._cFilter===c?' selected':''}>${c}</option>`).join('');
  const spList=window._cFilter==='all'?S.spirits:S.spirits.filter(s=>s.cat===window._cFilter);
  
  const rows=spList.map(sp=>{
    const consumedML=getConsumedML(sp.id),consumedBot=consumedML/sp.ml;
    const remBot=getRemainingBottles(sp),remML=remBot*sp.ml,p=getRemainingPct(sp),st=status(p);
    const fillColor=p<=0?'#F09595':p>=0.5?'#97C459':p>=0.25?'#EF9F27':'#E24B4A';
    return`<tr>
      <td style="font-weight:500">${sp.name}</td>
      <td><span style="background:var(--color-background-secondary);border-radius:6px;padding:2px 7px;font-size:11px">${sp.cat}</span></td>
      <td style="text-align:center">${sp.ml}ml</td>
      <td style="text-align:center"><span style="font-weight:500">${sp.stock.toFixed(2)}</span><span style="font-size:10px;color:var(--color-text-tertiary);display:block">inicial</span></td>
      <td style="text-align:center">${consumedBot>0?`<span style="color:#A32D2D;font-weight:500">−${consumedBot.toFixed(2)}</span>`:'—'}</td>
      <td style="text-align:center">
        <span style="font-weight:500;color:${p<=0?'#A32D2D':p>=0.5?'#3B6D11':p>=0.25?'#854F0B':'#A32D2D'}">${remBot.toFixed(2)}</span>
        <span style="font-size:10px;color:var(--color-text-tertiary);display:block">${Math.round(remML).toLocaleString()} ml</span>
      </td>
      <td style="min-width:70px">
        <div style="height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;margin-bottom:4px">
          <div style="height:100%;width:${Math.round(p*100)}%;background:${fillColor};border-radius:2px"></div>
        </div>
        <span style="font-size:10px;color:var(--color-text-secondary)">${Math.round(p*100)}% disponible</span>
      </td>
    </tr>`;
  }).join('');

  return `
    <div class="page-title">Catálogo de Licores</div>
    <div class="page-sub">Inventario inicial vs Desglose de consumo acumulado</div>
    <div class="toolbar">
      <label style="font-size:12px;color:var(--color-text-secondary)">Filtrar Tipo:</label>
      <select class="sel" onchange="window._cFilter=this.value;render()" style="font-size:12px;padding:5px 9px">${catOpts}</select>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Licor</th>
            <th>Categoría</th>
            <th style="text-align:center">Capacidad</th>
            <th style="text-align:center">Stock Inicial</th>
            <th style="text-align:center">Consumido</th>
            <th style="text-align:center">Actual (Botellas / ML)</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
    </div>`;
}

// Renderizado inicial al cargar la página
render();
</script>
</body>
</html>
